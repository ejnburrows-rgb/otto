  async function boot() {
    document.documentElement.setAttribute('data-theme', localStorage.getItem('otto_theme') || 'light');
    await load();
    
    // Force PIN updates for requested users if they exist
    let _changed = false;
    const fixPin = (id, p, role) => { 
      const u = get('users', id); 
      if (u) {
        if (u.pin !== p) { u.pin = p; _changed = true; }
        if (role && u.role !== role) { u.role = role; _changed = true; }
      }
    };
    fixPin('owner-1', '0721');
    fixPin('owner-2', '0722');
    fixPin('emp-1', '0715', 'field');
    fixPin('emp-2', '0723', 'office');
    
    // Clean up legacy duplicated users
    const oldUsers = db.users.filter(u => ['Owner', 'Office', 'Field Worker', 'Accounting', 'Employee Three', 'Employee Four', 'Employee Five'].includes(u.name) || u.id.startsWith('emp-3') || u.id.startsWith('emp-4') || u.id.startsWith('emp-5'));
    if (oldUsers.length > 0) {
      db.users = db.users.filter(u => !oldUsers.includes(u));
      _changed = true;
    }
    if (_changed) save();

    await calcAllWeeklyHours();
    // Try cloud pull on boot if configured (best-effort).
    if (fbConfig()) { try { await cloudPull(); } catch (e) { } }
    const sid = localStorage.getItem('otto_session');
    if (sid) { session = get('users', sid); }
    if (session) startApp(); else showLogin();
    if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('./sw.js'); } catch (e) { } }

  /* ============================ GMAIL INBOX & AI TAKEOFF ============================ */
  let _gmailToken = null;
  let _gmailTimer = null;

  function saveGoogleClient() {
    if (!db.meta) db.meta = {};
    db.meta.googleClientId = ($('#set-gclient').value || '').trim();
    save();
    toast(t('saved'), 'success');
  }

  function connectGmail() {
    if (!db.meta || !db.meta.googleClientId) return toast(lang==='es'?'Falta Client ID':'Missing Client ID', 'error');
    const client = google.accounts.oauth2.initTokenClient({
      client_id: db.meta.googleClientId,
      scope: 'https://www.googleapis.com/auth/gmail.readonly',
      callback: (response) => {
        if (response.error) return toast('OAuth Error: ' + response.error, 'error');
        _gmailToken = response.access_token;
        toast(lang==='es'?'Conectado a Gmail':'Connected to Gmail', 'success');
        fetchNewEmails();
        if (_gmailTimer) clearInterval(_gmailTimer);
        _gmailTimer = setInterval(fetchNewEmails, 60000); // Poll every 60 seconds
      },
    });
    client.requestAccessToken();
  }

  async function fetchNewEmails() {
    if (!_gmailToken) return;
    try {
      const histId = db.meta.gmailHistoryId;
      // If historyId exists, we could use history API, but for simplicity in v1 we poll latest messages
      // and skip those we already have in db.inbox_emails.
      let url = 'https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10';
      
      const res = await fetch(url, { headers: { Authorization: `Bearer ${_gmailToken}` } });
      if (!res.ok) throw new Error('Gmail fetch failed');
      const data = await res.json();
      if (!data.messages) return;

      let added = false;
      for (const m of data.messages) {
        if (db.inbox_emails.find(e => e.id === m.id)) continue;
        const detailRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}`, { headers: { Authorization: `Bearer ${_gmailToken}` } });
        const detail = await detailRes.json();
        
        let subject = '(no subject)', from = '', preview = detail.snippet;
        const headers = detail.payload.headers;
        headers.forEach(h => {
          if (h.name.toLowerCase() === 'subject') subject = h.value;
          if (h.name.toLowerCase() === 'from') from = h.value;
        });

        const attachments = [];
        if (detail.payload.parts) {
          for (const p of detail.payload.parts) {
            if (p.filename && p.body && p.body.attachmentId) {
              const attRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}/attachments/${p.body.attachmentId}`, { headers: { Authorization: `Bearer ${_gmailToken}` } });
              const attData = await attRes.json();
              attachments.push({
                name: p.filename,
                mimeType: p.mimeType,
                data: attData.data.replace(/-/g, '+').replace(/_/g, '/') // base64url to standard base64
              });
            }
          }
        }

        db.inbox_emails.push({
          id: m.id, from, subject, preview,
          receivedAt: new Date(parseInt(detail.internalDate)).toISOString(),
          attachments,
          aiTakeoffStatus: 'none',
          read: false
        });
        added = true;
      }
      
      db.meta.gmailHistoryId = data.resultSizeEstimate || Date.now();
      save();
      if (added && route.view === 'inbox') renderInbox();
    } catch (e) { console.error('Gmail fetch error', e); }
  }

    } else {

          <div style="font-size:11px; color:var(--text3); margin-bottom:8px">${new Date(e.receivedAt).toLocaleString()}</div>
          ${e.attachments.map((a, i) => {

                  <button class="btn ghost small" onclick="previewPDF('${e.id}', ${i})"><i class="fas fa-eye"></i> ${t('preview')}</button>

                </div>
              </div>`;

  function previewPDF(emailId, attIdx) {
    const e = db.inbox_emails.find(x => x.id === emailId);
    if (!e) return;
    const att = e.attachments[attIdx];
    
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="width:100%; height:100%; max-width:none; max-height:none; border-radius:0; display:flex; flex-direction:column; padding:0;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--blue); color:white">
        <div style="font-weight:bold">${esc(att.name)}</div>
        <div>
          <button class="btn small" style="background:var(--accent); border:none;" onclick="analyzePdfAI('${e.id}', ${attIdx})"><i class="fas fa-robot"></i> ${t('analyzeAI')}</button>
          <button class="btn ghost small" style="color:white; margin-left:8px; border:none;" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-xmark"></i></button>
        </div>
      </div>
      <div id="pdf-viewer" style="flex:1; overflow:auto; background:#333; display:flex; flex-direction:column; align-items:center; padding:20px; gap:20px;"></div>
    </div>`;
    document.body.appendChild(overlay);

    const pdfData = atob(att.data);
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    if (!pdfjsLib) return toast('PDF.js not loaded', 'error');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    const loadingTask = pdfjsLib.getDocument({data: pdfData});
    loadingTask.promise.then(pdf => {
      const viewer = document.getElementById('pdf-viewer');
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        pdf.getPage(pageNum).then(page => {
          const viewport = page.getViewport({scale: 1.5});
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          viewer.appendChild(canvas);
          page.render({canvasContext: context, viewport: viewport});
        });
      }
    });
  }

  async function analyzePdfAI(emailId, attIdx) {
    const e = db.inbox_emails.find(x => x.id === emailId);
    if (!e) return;
    const att = e.attachments[attIdx];
    const nviKey = db.meta.nvidiaKey;
    if (!nviKey) return toast(lang==='es'?'Falta clave NVIDIA':'Missing NVIDIA Key', 'error');

    toast(t('reading'), 'info');
    document.querySelector('.modal-overlay')?.remove();

    try {
      const pdfData = atob(att.data);
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      
      const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({scale: 1.5});
      const canvas = document.createElement('canvas');
      canvas.height = viewport.height; canvas.width = viewport.width;
      await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
      const imgB64 = canvas.toDataURL('image/jpeg').split(',')[1];

      const res = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${nviKey}` },
        body: JSON.stringify({
          model: 'nvidia/llama-3.1-nemotron-nano-vl-8b-v1',
          messages: [{
            role: 'user',
            content: `You are a licensed plumbing estimator. From this floor plan image extract:
- All fixture locations (toilet, sink, shower, tub, water heater, dishwasher, washing machine connection)
- Linear feet of hot water supply pipe, cold water supply pipe, and drain/waste pipe
- Fitting types and counts (elbows, tees, couplings, valves)
- Rough-in dimensions where visible
Return ONLY valid JSON: { "fixtures": [], "pipes": [], "fittings": [], "notes": "" } <img src="data:image/jpeg;base64,${imgB64}" />`
          }],
          temperature: 0.2
        })
      });

      if (!res.ok) throw new Error('API Error');
      const data = await res.json();
      let text = data.choices[0].message.content;
      const jmatch = text.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(jmatch ? jmatch[0] : text);

      let html = `<h2>✅ ${t('aiAnalysisComplete')}</h2>
        <div style="margin:12px 0; background:var(--bg); padding:10px; border-radius:8px">
          <div><b>${t('foundFixtures')}:</b> ${(parsed.fixtures||[]).length} ${t('fixturesL')} &middot; ${(parsed.pipes||[]).length} ${t('pipesL')} &middot; ${(parsed.fittings||[]).length} ${t('fittingsL')}</div>
        </div>
        <div class="field"><label>${t('assignTo')}</label>
          <div style="display:flex; gap:8px">
            <button class="btn" style="flex:1" onclick="assignTakeoff('${emailId}', ${attIdx}, 'new', '${esc(JSON.stringify(parsed))}')"><i class="fas fa-folder-plus"></i> ${t('createNewProject')}</button>
            <button class="btn ghost" style="flex:1" onclick="selectJobForTakeoff('${emailId}', ${attIdx}, '${esc(JSON.stringify(parsed))}')"><i class="fas fa-search"></i> ${t('existingJob')}</button>
          </div>
        </div>
        <button class="btn block ghost" onclick="closeModal()">${t('cancel')}</button>`;
      modal(html);
    } catch (err) {
      console.error(err);
      toast(t('couldntRead'), 'error');
    }
  }

  function selectJobForTakeoff(emailId, attIdx, parsedJson) {
    const jobs = db.jobs.filter(j => j.status !== 'completed' && j.status !== 'canceled');
    let html = `<h2>${t('existingJob')}</h2><div class="card" style="max-height:300px; overflow:auto">
      ${jobs.map(j => `<div class="list-item" onclick="assignTakeoff('${emailId}', ${attIdx}, '${j.id}', '${parsedJson}')"><div class="li-main"><div class="li-title">${esc(j.title)}</div><div class="li-sub">${esc(customerName(j.customerId))}</div></div></div>`).join('')}
    </div><button class="btn block ghost" onclick="closeModal()">${t('cancel')}</button>`;
    modal(html);
  }

  async function assignTakeoff(emailId, attIdx, jobId, parsedJson) {
    const e = db.inbox_emails.find(x => x.id === emailId);
    const att = e.attachments[attIdx];
    const parsed = JSON.parse(parsedJson);
    
    const binaryStr = atob(att.data);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
    const blob = new Blob([bytes], {type: att.mimeType});
    const blobId = await storeFile(blob);
    
    let targetJobId = jobId;
    if (jobId === 'new') {
      targetJobId = uid();
      db.jobs.push({
        id: targetJobId, title: t('aiTakeoffTitle') + ': ' + att.name, customerId: '', status: 'new',
        created: nowISO(), materials: []
      });
    }
    
    const job = db.jobs.find(j => j.id === targetJobId);
    if (!job.materials) job.materials = [];
    
    if (parsed.fixtures) parsed.fixtures.forEach(f => job.materials.push({ id:uid(), item: f, qty: 1, unit: 'ea', addedByAI: true }));
    if (parsed.pipes) parsed.pipes.forEach(p => job.materials.push({ id:uid(), item: p, qty: 1, unit: 'lf', addedByAI: true }));
    if (parsed.fittings) parsed.fittings.forEach(f => job.materials.push({ id:uid(), item: f, qty: 1, unit: 'ea', addedByAI: true }));
    
    if (!job.documents) job.documents = [];
    job.documents.push({ id: uid(), fileId: blobId, name: att.name, mime: att.mimeType, date: nowISO() });
    
    if (parsed.notes) {
      if (!job.notes) job.notes = '';
      job.notes += '\nAI Notes: ' + parsed.notes;
    }
    
    e.aiTakeoffStatus = 'complete';
    e.linkedJobId = targetJobId;
    e.read = true;
    save();
    closeModal();
    nav('job');
    window.viewJob(targetJobId);
    toast(t('saved'), 'success');
  }
