<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d6e" />
  <title>OTTO Plumbing CRM</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1995/1995470.png" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1995/1995470.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #0f3d6e;
      --blue2: #1761a0;
      --accent: #1f8fff;
      --green: #1f9d55;
      --amber: #e0820a;
      --red: #d93636;
      --bg: #f4f6fa;
      --card: #ffffff;
      --line: #e2e8f0;
      --text: #14233a;
      --text2: #5b6b82;
      --text3: #93a1b5;
      --radius: 16px;
      --shadow: 0 2px 10px rgba(15, 61, 110, .08);
      --shadow2: 0 8px 30px rgba(15, 61, 110, .16);
      --tap: 56px;
    }

    [data-theme="dark"] {
      --bg: #0b1220;
      --card: #131c2e;
      --line: #243349;
      --text: #e8eef7;
      --text2: #9fb0c7;
      --text3: #6b7c95;
      --shadow: 0 2px 10px rgba(0, 0, 0, .35);
      --shadow2: 0 8px 30px rgba(0, 0, 0, .5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.4;
      overflow-x: hidden;
    }

    button, input, select, textarea { font-family: inherit; font-size: 16px; color: inherit; }

    .hidden { display: none !important; }

    /* ===== Top bar ===== */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      background: var(--blue);
      color: #fff;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top));
      box-shadow: var(--shadow);
    }
    .topbar .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; }
    .topbar .brand i { color: #6fc3ff; }
    .topbar .spacer { flex: 1; }
    .iconbtn {
      width: 44px; height: 44px; border: none; border-radius: 12px;
      background: rgba(255, 255, 255, .14); color: #fff; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .iconbtn:active { transform: scale(.94); }
    .langtoggle {
      display: flex; background: rgba(255, 255, 255, .14); border-radius: 12px; overflow: hidden;
    }
    .langtoggle button {
      border: none; background: transparent; color: #cfe4ff; padding: 8px 12px; font-weight: 700; cursor: pointer;
    }
    .langtoggle button.on { background: #fff; color: var(--blue); }

    /* ===== Layout ===== */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px 14px 110px; }
    .pagehead { display: flex; align-items: center; gap: 12px; margin: 4px 0 16px; }
    .pagehead h1 { font-size: 24px; font-weight: 800; }
    .pagehead .sub { color: var(--text2); font-size: 14px; }
    .back { background: var(--card); border: 1px solid var(--line); border-radius: 12px; width: 44px; height: 44px; cursor: pointer; box-shadow: var(--shadow); }

    /* ===== Home tiles ===== */
    .greet { font-size: 15px; color: var(--text2); margin-bottom: 2px; }
    .greet b { color: var(--text); }
    .tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 14px; }
    @media (min-width: 720px) { .tiles { grid-template-columns: repeat(3, 1fr); } }
    .tile {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 22px 16px; cursor: pointer; text-align: center; box-shadow: var(--shadow);
      display: flex; flex-direction: column; align-items: center; gap: 10px; min-height: 132px;
      justify-content: center; transition: transform .08s, box-shadow .15s;
    }
    .tile:active { transform: scale(.97); }
    .tile .ic { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; }
    .tile .lbl { font-weight: 700; font-size: 16px; line-height: 1.2; }
    .tile .cnt { font-size: 13px; color: var(--text2); }
    .tile.big { grid-column: span 2; flex-direction: row; justify-content: flex-start; text-align: left; padding: 20px; }
    .tile.big .ic { width: 56px; height: 56px; }
    .tile.big .lbl { font-size: 18px; }

    /* ===== Cards / list ===== */
    .section-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin: 22px 4px 10px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .card + .card { margin-top: 12px; }
    .list-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--line);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--bg); }
    .avatar { width: 46px; height: 46px; border-radius: 12px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 17px; }
    .li-main { flex: 1; min-width: 0; }
    .li-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .li-sub { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .li-right { text-align: right; font-size: 13px; color: var(--text2); flex: 0 0 auto; }
    .chev { color: var(--text3); }

    .empty { text-align: center; color: var(--text2); padding: 40px 20px; }
    .empty i { font-size: 40px; color: var(--text3); display: block; margin-bottom: 12px; }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: var(--tap); padding: 0 20px; border-radius: 14px; border: none; cursor: pointer;
      font-weight: 700; font-size: 16px; background: var(--accent); color: #fff; box-shadow: var(--shadow);
    }
    .btn:active { transform: scale(.97); }
    .btn.block { width: 100%; }
    .btn.green { background: var(--green); }
    .btn.amber { background: var(--amber); }
    .btn.red { background: var(--red); }
    .btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--line); }
    .btn.sm { min-height: 42px; padding: 0 14px; font-size: 14px; border-radius: 11px; }
    .btnrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btnrow .btn { flex: 1; }

    .fab {
      position: fixed; right: 18px; bottom: calc(86px + env(safe-area-inset-bottom));
      width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: #fff;
      border: none; font-size: 26px; box-shadow: var(--shadow2); cursor: pointer; z-index: 30;
    }
    .fab:active { transform: scale(.93); }

    /* ===== Bottom nav ===== */
    .bottomnav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 35;
      background: var(--card); border-top: 1px solid var(--line);
      display: flex; padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(15, 61, 110, .06);
    }
    .bottomnav button {
      flex: 1; border: none; background: none; cursor: pointer; color: var(--text2);
      display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 2px; font-size: 11px; font-weight: 600;
    }
    .bottomnav button i { font-size: 21px; }
    .bottomnav button.on { color: var(--accent); }

    /* ===== Forms ===== */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: var(--text2); }
    .field input, .field select, .field textarea {
      width: 100%; min-height: var(--tap); padding: 12px 14px; border: 1.5px solid var(--line);
      border-radius: 12px; background: var(--bg); color: var(--text); outline: none;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field .with-voice { display: flex; gap: 8px; align-items: flex-start; }
    .field .with-voice textarea, .field .with-voice input { flex: 1; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    /* ===== Modal ===== */
    .overlay {
      position: fixed; inset: 0; background: rgba(10, 20, 40, .55); z-index: 60;
      display: flex; align-items: flex-end; justify-content: center; padding: 0;
    }
    @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
    .sheet {
      background: var(--card); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
      border-radius: 22px 22px 0 0; box-shadow: var(--shadow2); padding: 20px 18px calc(24px + env(safe-area-inset-bottom));
    }
    @media (min-width: 600px) { .sheet { border-radius: 22px; } }
    .sheet h2 { font-size: 20px; margin-bottom: 4px; }
    .sheet .sheet-sub { color: var(--text2); font-size: 14px; margin-bottom: 16px; }
    .sheet-close { float: right; background: var(--bg); border: none; width: 38px; height: 38px; border-radius: 10px; font-size: 18px; cursor: pointer; color: var(--text2); }

    /* ===== Misc ===== */
    .pill { display: inline-block; padding: 4px 11px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .pill.gray { background: var(--bg); color: var(--text2); }
    .pill.blue { background: #e3f0ff; color: var(--blue2); }
    .pill.green { background: #dff4e8; color: var(--green); }
    .pill.amber { background: #fdf0d9; color: var(--amber); }
    .pill.red { background: #fbe2e2; color: var(--red); }
    [data-theme="dark"] .pill.blue { background: rgba(31,143,255,.18); }
    [data-theme="dark"] .pill.green { background: rgba(31,157,85,.2); }
    [data-theme="dark"] .pill.amber { background: rgba(224,130,10,.2); }
    [data-theme="dark"] .pill.red { background: rgba(217,54,54,.2); }

    .searchbar { position: relative; margin-bottom: 14px; }
    .searchbar i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); }
    .searchbar input { width: 100%; min-height: 50px; padding: 12px 14px 12px 44px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--card); color: var(--text); outline: none; box-shadow: var(--shadow); }

    .kv { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .kv:last-child { border-bottom: none; }
    .kv .k { width: 120px; flex: 0 0 auto; color: var(--text2); font-size: 14px; }
    .kv .v { flex: 1; font-weight: 600; word-break: break-word; }

    .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photos-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; background: var(--bg); }

    .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
    .tabs button { white-space: nowrap; border: 1px solid var(--line); background: var(--card); color: var(--text2); padding: 9px 14px; border-radius: 999px; font-weight: 600; cursor: pointer; }
    .tabs button.on { background: var(--blue); color: #fff; border-color: var(--blue); }

    .toast {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(100px + env(safe-area-inset-bottom));
      background: var(--text); color: var(--bg); padding: 12px 18px; border-radius: 12px; z-index: 90;
      box-shadow: var(--shadow2); font-weight: 600; font-size: 14px; max-width: 90vw; text-align: center;
      animation: pop .2s; }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--red); color: #fff; }
    @keyframes pop { from { opacity: 0; transform: translate(-50%, 10px); } }

    .listening { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

    /* ===== Login ===== */
    .login { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 18px; background: linear-gradient(160deg, var(--blue), var(--blue2)); color: #fff; }
    .login .logo { width: 92px; height: 92px; border-radius: 24px; background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; font-size: 46px; }
    .login h1 { font-size: 28px; font-weight: 800; }
    .login p { opacity: .85; }
    .login .card-login { background: #fff; color: var(--text); border-radius: 22px; padding: 22px; width: 100%; max-width: 380px; box-shadow: var(--shadow2); }
    .pinpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .pinpad button { min-height: 62px; border: 1px solid var(--line); border-radius: 14px; background: var(--bg); font-size: 22px; font-weight: 700; cursor: pointer; }
    .pinpad button:active { background: var(--accent); color: #fff; }
    .pindots { display: flex; gap: 12px; justify-content: center; margin: 14px 0; }
    .pindots span { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--accent); }
    .pindots span.f { background: var(--accent); }

    .chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .bubble { max-width: 85%; padding: 11px 14px; border-radius: 16px; line-height: 1.45; white-space: pre-wrap; }
    .bubble.me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .bubble.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: 5px; }
    .bubble.bot .src { display: block; margin-top: 8px; font-size: 12px; color: var(--text3); }

    a { color: var(--accent); }
    .muted { color: var(--text2); font-size: 14px; }
    .note-item { padding: 12px 0; border-bottom: 1px solid var(--line); }
    .note-item:last-child { border-bottom: none; }
    .note-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
  </style>
</head>

  /* ============================ IndexedDB storage ============================ */
  let _idb = null;
  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('otto-crm', 1);
      r.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv');
        if (!d.objectStoreNames.contains('files')) d.createObjectStore('files');
      };
      r.onsuccess = () => { _idb = r.result; res(_idb); };
      r.onerror = () => rej(r.error);
    });
  }
  function idbPut(store, key, val) {
    return new Promise((res, rej) => {
      const tx = _idb.transaction(store, 'readwrite');
      tx.objectStore(store).put(val, key);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  function idbGet(store, key) {
    return new Promise((res, rej) => {
      const tx = _idb.transaction(store, 'readonly');
      const rq = tx.objectStore(store).get(key);
      rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
    });
  }
  function idbDel(store, key) {
    return new Promise((res) => {
      const tx = _idb.transaction(store, 'readwrite');
      tx.objectStore(store).delete(key); tx.oncomplete = res; tx.onerror = res;
    });
  }

  let _saveTimer = null;
  function save() {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async () => {
      try {
        db.meta.updated = nowISO();
        await idbPut('kv', 'db', JSON.stringify(db));
        // localStorage backup keeps a safety copy even if IndexedDB is wiped.
        try { localStorage.setItem('otto_db_backup', JSON.stringify(db)); } catch (e) { }
        cloudPush();
      } catch (e) { console.warn('save failed', e); }
    }, 250);
  }
  async function load() {
    await openDB();
    let raw = await idbGet('kv', 'db');
    if (!raw) raw = localStorage.getItem('otto_db_backup');
    if (raw) {
      try { db = JSON.parse(raw); } catch (e) { db = blankDB(); }
      // forward-compat: ensure all collections exist
      COLLECTIONS.forEach(c => { if (!Array.isArray(db[c])) db[c] = []; });
      if (!db.meta) db.meta = { version: 1 };
    } else {
      db = blankDB();
      await idbPut('kv', 'db', JSON.stringify(db));
    }
  }

  /* file blobs (photos, documents, CAD) stored separately */
  async function storeFile(blob) { const id = 'f_' + uid(); await idbPut('files', id, blob); return id; }
  async function getFileURL(id) { const b = await idbGet('files', id); return b ? URL.createObjectURL(b) : null; }

  /* ============================ optional Firebase REST cloud sync ============================ */
  function fbConfig() { try { return JSON.parse(localStorage.getItem('otto_fb') || 'null'); } catch (e) { return null; } }
  let _cloudTimer = null;
  function cloudPush() {
    const cfg = fbConfig(); if (!cfg || !cfg.projectId || !cfg.apiKey) return;
    clearTimeout(_cloudTimer);
    _cloudTimer = setTimeout(async () => {
      try {
        const url = `https://firestore.googleapis.com/v1/projects/${cfg.projectId}/databases/(default)/documents/otto_crm/data?key=${cfg.apiKey}`;
        await fetch(url, { method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { json: { stringValue: JSON.stringify(db) } } }) });
      } catch (e) { console.warn('cloud push failed', e); }
    }, 1500);
  }
  async function cloudPull() {
    const cfg = fbConfig(); if (!cfg || !cfg.projectId || !cfg.apiKey) return false;
    try {
      const url = `https://firestore.googleapis.com/v1/projects/${cfg.projectId}/databases/(default)/documents/otto_crm/data?key=${cfg.apiKey}`;
      const r = await fetch(url); if (!r.ok) return false;
      const d = await r.json();
      const json = d && d.fields && d.fields.json && d.fields.json.stringValue;
      if (json) { db = JSON.parse(json); COLLECTIONS.forEach(c => { if (!Array.isArray(db[c])) db[c] = []; }); await idbPut('kv', 'db', JSON.stringify(db)); return true; }
    } catch (e) { console.warn('cloud pull failed', e); }
    return false;
  }

  /* ============================ generic record helpers ============================ */
  function get(col, id) { return (db[col] || []).find(x => x.id === id); }
  function add(col, obj) {
    obj.id = obj.id || uid(); obj.created = obj.created || nowISO();
    obj.createdBy = session ? session.id : null;
    db[col].unshift(obj); save(); return obj;
  }
  function update(col, id, patch) { const o = get(col, id); if (o) { Object.assign(o, patch, { updated: nowISO() }); save(); } return o; }
  function remove(col, id) { db[col] = db[col].filter(x => x.id !== id); save(); }

  function customerName(id) { const c = get('customers', id); return c ? c.name : '—'; }
  function jobTitle(id) { const j = get('jobs', id); return j ? j.title : '—'; }
  function userName(id) { const u = get('users', id); return u ? u.name : '—'; }
  function money(n) { return '$' + (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtDate(s) { if (!s) return '—'; const d = new Date(s); if (isNaN(d)) return s; return d.toLocaleDateString(lang === 'es' ? 'es-US' : 'en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  function timeAgo(s) {
    const d = new Date(s), diff = (Date.now() - d) / 1000;
    if (diff < 60) return lang === 'es' ? 'ahora' : 'now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd';
    return fmtDate(s);
  }
  const initials = (s) => (s || '?').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  const colorFor = (s) => { let h = 0; for (const c of (s || 'x')) h = (h * 31 + c.charCodeAt(0)) % 360; return `hsl(${h},55%,45%)`; };

  /* status helpers */
  function statusPill(s) {
    const map = { scheduled: 'blue', inProgress: 'amber', completed: 'green', onHold: 'gray', canceled: 'red',
      new: 'blue', draft: 'gray', sent: 'blue', approved: 'green', paid: 'green', unpaid: 'amber',
      partial: 'amber', overdue: 'red', due: 'amber', done: 'green', pending: 'amber' };
    return `<span class="pill ${map[s] || 'gray'}">${t(s) || s}</span>`;
  }

          <h1>OTTO Plumbing</h1>
          <p>${esc(t('pickUser'))}</p>

      } else {
        lg.innerHTML = `
          <div class="logo">${initials(selUser.name)}</div>
          <h1>${esc(selUser.name)}</h1>
          <p>${esc(t('enterPin'))}</p>
          <div class="card-login">
            <div class="pindots">${[0, 1, 2, 3].map(i => `<span class="${i < pin.length ? 'f' : ''}"></span>`).join('')}</div>
            <div class="pinpad">
              ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => `<button onclick="window.__pin('${n}')">${n}</button>`).join('')}
              <button onclick="window.__back2()"><i class="fas fa-arrow-left"></i></button>
              <button onclick="window.__pin('0')">0</button>
              <button onclick="window.__pinDel()"><i class="fas fa-delete-left"></i></button>
            </div>
          </div>`;
      }
    }
    window.__pick = (id) => { selUser = get('users', id); pin = ''; draw(); };
    window.__back2 = () => { selUser = null; pin = ''; draw(); };
    window.__pinDel = () => { pin = pin.slice(0, -1); draw(); };
    window.__pin = (n) => {
      pin += n; draw();
      if (pin.length === 4) {
        if (pin === selUser.pin) {
          session = selUser; localStorage.setItem('otto_session', selUser.id);
          if (selUser.lang) setLang(selUser.lang);
          startApp();
        } else { toast(t('wrongPin'), 'error'); pin = ''; setTimeout(draw, 400); }

    draw();

  /* ============================ ROUTER ============================ */

      // entity detail views allowed if their list is allowed
    }
    route = { view, id, tab }; window.scrollTo(0, 0); render();

  function back() { window.history.length > 1 ? render() : nav('home'); }

  /* ---------- shared building blocks ---------- */
  function pageHead(title, sub, withBack) {
    return `<div class="pagehead">${withBack ? `<button class="back" onclick="${withBack}"><i class="fas fa-arrow-left"></i></button>` : ''}
      <div><h1>${esc(title)}</h1>${sub ? `<div class="sub">${esc(sub)}</div>` : ''}</div></div>`;
  }
  function searchBox(id, ph) { return `<div class="searchbar"><i class="fas fa-magnifying-glass"></i><input id="${id}" placeholder="${esc(ph || t('search'))}" oninput="render()" value="${esc(_search[id] || '')}"></div>`; }
  const _search = {};
  function bindSearch(id) { const el = $('#' + id); if (el) el.oninput = () => { _search[id] = el.value; render(); el2focus(id); }; }
  function el2focus(id) { const el = $('#' + id); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }
  function emptyState(msg) { return `<div class="empty"><i class="fas fa-box-open"></i>${esc(msg || t('noResults'))}</div>`; }
  function matches(obj, q) { if (!q) return true; return JSON.stringify(obj).toLowerCase().includes(q.toLowerCase()); }

  /* ============================ HOME ============================ */
  function viewHome() {
    const hour = new Date().getHours();
    const greet = hour < 12 ? (lang === 'es' ? 'Buenos días' : 'Good morning') : hour < 18 ? (lang === 'es' ? 'Buenas tardes' : 'Good afternoon') : (lang === 'es' ? 'Buenas noches' : 'Good evening');
    const myJobs = db.jobs.filter(j => j.assignedTo === session.id && !['completed', 'canceled'].includes(j.status));
    const activeJobs = db.jobs.filter(j => !['completed', 'canceled'].includes(j.status));
    const openFollow = db.followups.filter(f => f.status !== 'done' && (!f.assignedTo || f.assignedTo === session.id || session.role !== 'field'));
    const tiles = [];
    const T_ = (icon, color, lbl, action, cnt) => ({ icon, color, lbl, action, cnt });
    if (session.role === 'field') {
      tiles.push(T_('fa-screwdriver-wrench', 'var(--blue)', t('myJobs'), "nav('jobs')", myJobs.length + ''));
      tiles.push(T_('fa-camera', 'var(--green)', t('addPhoto'), 'quickPhoto()'));
      tiles.push(T_('fa-microphone', 'var(--amber)', t('voiceNote'), 'quickVoiceNote()'));
      tiles.push(T_('fa-location-dot', 'var(--accent)', t('clockIn'), 'shareLocation()'));
      tiles.push(T_('fa-bell', 'var(--red)', t('followups'), "nav('followups')", openFollow.length + ''));
      tiles.push(T_('fa-robot', 'var(--blue2)', t('ask'), "nav('assistant')"));
    } else {
      tiles.push(T_('fa-phone', 'var(--green)', t('newCall'), 'newCall()'));
      tiles.push(T_('fa-screwdriver-wrench', 'var(--blue)', t('newJob'), 'openJobForm()'));
      tiles.push(T_('fa-users', 'var(--accent)', t('customers'), "nav('customers')", db.customers.length + ''));
      tiles.push(T_('fa-camera', 'var(--amber)', t('scanCheck'), 'quickScanCheck()'));
      tiles.push(T_('fa-microphone', 'var(--blue2)', t('voiceNote'), 'quickVoiceNote()'));
      tiles.push(T_('fa-robot', 'var(--red)', t('ask'), "nav('assistant')"));
    }
    let html = `<div class="greet">${greet}, <b>${esc(session.name)}</b></div>
      <div class="muted">${fmtDate(todayISO())}</div>
      <div class="tiles">${tiles.map(x => `<div class="tile" onclick="${x.action}">
        <div class="ic" style="background:${x.color}"><i class="fas ${x.icon}"></i></div>
        <div class="lbl">${esc(x.lbl)}</div>${x.cnt != null ? `<div class="cnt">${x.cnt}</div>` : ''}</div>`).join('')}</div>`;

    // My day / active jobs snapshot
    const list = (session.role === 'field' ? myJobs : activeJobs).slice(0, 5);
    html += `<div class="section-title">${session.role === 'field' ? t('myDay') : t('activeJobs')}</div>`;
    html += `<div class="card">${list.length ? list.map(jobRow).join('') : emptyState(session.role === 'field' ? t('noJobsToday') : t('noResults'))}</div>`;

    if (openFollow.length && session.role !== 'field') {
      html += `<div class="section-title">${t('followups')}</div><div class="card">${openFollow.slice(0, 4).map(followRow).join('')}</div>`;
    }
    $('#main').innerHTML = html;
  }

  function downscale(file, max = 1600, q = 0.82) {
    return new Promise((res) => {
      const img = new Image(); const url = URL.createObjectURL(file);
      img.onload = () => {
        let { width, height } = img;
        if (width > max || height > max) { const r = Math.min(max / width, max / height); width *= r; height *= r; }
        const cv = document.createElement('canvas'); cv.width = width; cv.height = height;
        cv.getContext('2d').drawImage(img, 0, 0, width, height);
        cv.toBlob(b => { URL.revokeObjectURL(url); res(b || file); }, 'image/jpeg', q);
      };
      img.onerror = () => res(file); img.src = url;
    });
  }

  /* ============================ DOCUMENTS (+ scan/OCR + CAD) ============================ */
  function docRow(d) {
    const icon = d.kind === 'cad' ? 'fa-vector-square' : d.mime && d.mime.includes('pdf') ? 'fa-file-pdf' : d.mime && d.mime.includes('image') ? 'fa-file-image' : 'fa-file';
    return `<div class="list-item" onclick="openDoc('${d.id}')">
      <div class="avatar" style="background:${d.kind === 'cad' ? 'var(--blue2)' : 'var(--accent)'}"><i class="fas ${icon}"></i></div>
      <div class="li-main"><div class="li-title">${esc(d.name)}</div><div class="li-sub">${d.kind === 'cad' ? 'AutoCAD' : (d.kind || 'doc')} · ${timeAgo(d.created)}</div></div></div>`;
  }
  function uploadDoc(jobId, kind) {
    const inp = document.createElement('input'); inp.type = 'file';
    if (kind === 'cad') inp.accept = '.dwg,.dxf,.dwf,.dgn';
    else if (kind === 'scan') { inp.accept = 'image/*'; inp.capture = 'environment'; }
    inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      let blob = f, mime = f.type;
      if (kind === 'scan' && f.type.startsWith('image/')) blob = await downscale(f);
      const fileId = await storeFile(blob);
      const docRec = add('documents', { jobId, name: f.name || (kind + '-' + todayISO()), kind, mime, size: f.size });
      docRec.fileId = fileId; save();
      // If it's a scan, try OCR and attach the read text + offer to create check/invoice.
      if (kind === 'scan' && f.type.startsWith('image/')) {
        toast(t('scanning'));
        const dataUrl = await blobToDataURL(blob);
        const parsed = await ocrDocument(dataUrl);
        if (parsed) { update('documents', docRec.id, { ocr: parsed }); offerFromOCR(parsed, jobId, docRec.id); }
        else toast(t('readFailed'), 'error');
      }
      toast(t('saved'), 'success'); render();
    };
    inp.click();
  }
  async function openDoc(id) {
    const d = get('documents', id);
    const url = await getFileURL(d.fileId);
    const isImg = d.mime && d.mime.startsWith('image/');
    modal(`<h2>${esc(d.name)}</h2>
      ${isImg && url ? `<img src="${url}" style="width:100%;border-radius:12px;margin:10px 0">` : ''}
      ${d.ocr ? `<div class="card" style="padding:12px;margin-bottom:10px"><div class="muted">OCR</div><pre style="white-space:pre-wrap;font-family:inherit">${esc(typeof d.ocr === 'string' ? d.ocr : JSON.stringify(d.ocr, null, 2))}</pre></div>` : ''}
      <div class="btnrow">
        ${url ? `<a class="btn ghost" href="${url}" download="${esc(d.name)}"><i class="fas fa-download"></i> ${lang === 'es' ? 'Descargar' : 'Download'}</a>` : ''}
        <button class="btn red" onclick="confirmDel(()=>{remove('documents','${id}');closeModal();render()})"><i class="fas fa-trash"></i> ${t('delete')}</button>
      </div>`);
  }
  function blobToDataURL(b) { return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(b); }); }

  /* ============================ QuickBooks export ============================ */
  // Browser apps can't hold QuickBooks OAuth secrets safely, so we export the
  // CSV format QuickBooks Online imports directly for invoices and payments.
  function exportQuickBooks(kind) {
    if (kind === 'invoices') {
      const rows = [['Customer', 'InvoiceNo', 'InvoiceDate', 'DueDate', 'Item(Product/Service)', 'ItemAmount', 'Status', 'Balance']];
      db.invoices.forEach(i => rows.push([customerName(i.customerId), i.number || '', (i.date || '').slice(0, 10), (i.dueDate || '').slice(0, 10), i.title || 'Plumbing service', (i.amount || 0).toFixed(2), invStatus(i), ((i.amount || 0) - (i.paid || 0)).toFixed(2)]));
      downloadFile('quickbooks-invoices-' + todayISO() + '.csv', toCSV(rows), 'text/csv');
    } else {
      const rows = [['Customer', 'PaymentDate', 'PaymentMethod', 'Amount', 'InvoiceNo', 'RefNo']];
      db.payments.forEach(p => { const inv = p.invoiceId ? get('invoices', p.invoiceId) : null; rows.push([customerName(p.customerId), (p.date || '').slice(0, 10), p.method || '', (p.amount || 0).toFixed(2), inv ? inv.number : '', p.id.slice(-6)]); });
      downloadFile('quickbooks-payments-' + todayISO() + '.csv', toCSV(rows), 'text/csv');
    }
    toast(lang === 'es' ? 'Archivo listo para QuickBooks' : 'QuickBooks file ready', 'success');
  }
  function exportCSV(col) {
    const items = db[col]; if (!items.length) return toast(t('noResults'), 'error');
    const keys = Array.from(items.reduce((s, o) => { Object.keys(o).forEach(k => s.add(k)); return s; }, new Set()));
    const rows = [keys].concat(items.map(o => keys.map(k => o[k])));
    downloadFile(col + '-' + todayISO() + '.csv', toCSV(rows), 'text/csv');
  }
  function toCSV(rows) { return rows.map(r => r.map(c => { c = c == null ? '' : String(c); return /[",\n]/.test(c) ? '"' + c.replace(/"/g, '""') + '"' : c; }).join(',')).join('\n'); }
  function downloadFile(name, content, type) { const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  function voiceInto(targetId, btn) {

  /* ============================ OCR (Claude vision) ============================ */
  function aiKey() { return localStorage.getItem('otto_ai_key') || ''; }
  async function aiVision(dataUrl, prompt) {
    const key = aiKey(); if (!key) { toast(t('noKey'), 'error'); return null; }
    try {
      const mt = dataUrl.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';
      const b64 = dataUrl.split(',')[1];
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1024, messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: mt, data: b64 } }, { type: 'text', text: prompt }] }] })
      });
      if (!r.ok) return null;
      const d = await r.json(); const txt = d.content[0].text; const m = txt.match(/\{[\s\S]*\}/);
      return m ? JSON.parse(m[0]) : null;
    } catch (e) { console.warn('ocr', e); return null; }
  }
  function ocrCheck(dataUrl) { return aiVision(dataUrl, 'This is a photo of a check. Extract JSON only: {"name":"payer name","amount":0,"date":"YYYY-MM-DD","checkNumber":"","memo":""}'); }
  function ocrDocument(dataUrl) { return aiVision(dataUrl, 'Read this document (invoice/receipt/check/paperwork). Extract JSON only: {"type":"invoice|receipt|check|other","name":"company or person","amount":0,"date":"YYYY-MM-DD","checkNumber":"","memo":"short summary"}'); }

  /* ============================ ASSISTANT / CHATBOT ============================ */
  let chatHistory = [];
  function viewAssistant() {
    let html = pageHead(t('assistant'), 'OTTO');
    html += `<div class="chat-log" id="chatlog">${chatHistory.length ? chatHistory.map(m => `<div class="bubble ${m.role}">${esc(m.text)}${m.src ? `<span class="src"><i class="fas fa-link"></i> ${esc(m.src)}</span>` : ''}</div>`).join('') : `<div class="bubble bot">${lang === 'es' ? '¡Hola! Pregúntame sobre cualquier trabajo, cliente, factura o cómo hacer algo. Ej: "¿Cuánto debe Juan?" o "¿Cómo cambio un calentador?"' : 'Hi! Ask me about any job, customer, invoice, or how-to. e.g. "How much does Juan owe?" or "How do I replace a water heater?"'}</div>`}</div>`;
    html += `<div class="field" style="position:fixed;left:0;right:0;bottom:calc(70px + env(safe-area-inset-bottom));max-width:1100px;margin:0 auto;padding:10px 14px;background:var(--bg)">
      <div class="with-voice"><input id="chat-in" placeholder="${t('askPlaceholder')}" onkeydown="if(event.key==='Enter')askAssistant()">${voiceBtn('chat-in')}<button class="btn" style="flex:0 0 auto" onclick="askAssistant()"><i class="fas fa-paper-plane"></i></button></div></div>`;
    $('#main').innerHTML = html;
    const cl = $('#chatlog'); if (cl) cl.scrollTop = cl.scrollHeight;
  }
  // Build a compact, relevant context snapshot the model (or local search) can use.
  function buildContext(q) {
    const ql = (q || '').toLowerCase();
    const score = (obj) => { const s = JSON.stringify(obj).toLowerCase(); let n = 0; ql.split(/\s+/).forEach(w => { if (w.length > 2 && s.includes(w)) n++; }); return n; };
    const top = (col, n, fmt) => db[col].map(o => ({ o, s: score(o) })).filter(x => x.s > 0).sort((a, b) => b.s - a.s).slice(0, n).map(x => fmt(x.o));
    const parts = [];
    const cust = top('customers', 4, c => `Customer ${c.name}: ${c.phone || ''} ${c.address || ''} ${c.notes || ''}`);
    const jobs = top('jobs', 5, j => `Job "${j.title}" for ${customerName(j.customerId)} — status ${j.status}; ${j.description || ''}`);
    const notes = top('notes', 6, n => `Note on ${jobTitle(n.jobId)}: ${n.text}`);
    const invs = top('invoices', 5, i => `Invoice ${i.number} ${customerName(i.customerId)}: total ${money(i.amount)}, paid ${money(i.paid || 0)}, status ${invStatus(i)}`);
    const sops = top('sops', 3, s => `How-to "${s.title}": ${s.body}`);
    if (cust.length) parts.push('CUSTOMERS:\n' + cust.join('\n'));
    if (jobs.length) parts.push('JOBS:\n' + jobs.join('\n'));
    if (notes.length) parts.push('NOTES:\n' + notes.join('\n'));
    if (invs.length) parts.push('INVOICES:\n' + invs.join('\n'));
    if (sops.length) parts.push('SOPs:\n' + sops.join('\n'));
    return parts.join('\n\n');
  }
  async function askAssistant() {
    const inp = $('#chat-in'); const q = inp.value.trim(); if (!q) return;
    chatHistory.push({ role: 'me', text: q }); inp.value = ''; viewAssistant();
    const ctx = buildContext(q);
    const key = aiKey();
    if (!key) { // local fallback: keyword search over records
      const ans = localAnswer(q, ctx);
      chatHistory.push({ role: 'bot', text: ans.text, src: ans.src }); viewAssistant(); return;
    }
    chatHistory.push({ role: 'bot', text: '…' }); viewAssistant();
    try {
      const sys = `You are OTTO, the in-house assistant for a plumbing company. Answer briefly and practically in ${lang === 'es' ? 'Spanish' : 'English'} using ONLY the company data below. If the answer isn't in the data and isn't general plumbing how-to, say the office/owner should be asked. Data:\n\n${ctx || '(no matching records)'}`;
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 700, system: sys, messages: [{ role: 'user', content: q }] })
      });
      chatHistory.pop();
      if (!r.ok) { const a = localAnswer(q, ctx); chatHistory.push({ role: 'bot', text: a.text, src: a.src }); viewAssistant(); return; }
      const d = await r.json();
      chatHistory.push({ role: 'bot', text: d.content[0].text });
    } catch (e) { chatHistory.pop(); const a = localAnswer(q, ctx); chatHistory.push({ role: 'bot', text: a.text, src: a.src }); }
    viewAssistant();
  }
  function localAnswer(q, ctx) {
    if (ctx) return { text: (lang === 'es' ? 'Esto encontré en los registros:' : 'Here is what I found in the records:') + '\n\n' + ctx, src: lang === 'es' ? 'Datos de la empresa' : 'Company records' };
    return { text: lang === 'es' ? 'No encontré nada sobre eso. Pregunta a la oficina o al dueño. (Agrega una clave de IA en Ajustes para respuestas más inteligentes.)' : "I couldn't find anything about that. Please ask the office or owner. (Add an AI key in Settings for smarter answers.)", src: '' };
  }

  /* ============================ helpers: notify, selects, quick add ============================ */
  function notifyOffice(msg) {
    // In-app notification log; office/owner see it. (Push would need a backend.)
    db.meta.notifications = db.meta.notifications || [];
    db.meta.notifications.unshift({ msg, ts: nowISO(), by: session.id });
    db.meta.notifications = db.meta.notifications.slice(0, 50); save();
  }
  function jobSelect(id, sel) {
    return `<div class="field"><label>${t('job')}</label><select id="${id}"><option value="">—</option>${db.jobs.map(j => `<option value="${j.id}" ${sel === j.id ? 'selected' : ''}>${esc(j.title)} — ${esc(customerName(j.customerId))}</option>`).join('')}</select></div>`;
  }
  function listView(col, title, sk, rowFn, addFn) {
    const q = _search[sk] || '';
    const list = db[col].filter(o => matches(o, q));
    let html = pageHead(title, '') + searchBox(sk);
    html += `<div class="card">${list.length ? list.map(rowFn).join('') : emptyState()}</div>`;
    $('#main').innerHTML = html; bindSearch(sk);
  }
  // The big + button adapts to the current screen.
  function quickAdd() {
    const v = route.view;
    const map = {
      home: () => session.role === 'field' ? chooseJob('photo') : newCall(),
      customers: () => openCustomerForm(), customer: () => openJobForm(null, route.id),
      jobs: () => openJobForm(), calls: () => newCall(), estimates: () => openEstimateForm(),
      invoices: () => openInvoiceForm(), payments: () => openPaymentForm(), checks: () => openCheckForm({}),
      followups: () => openFollowForm(), workflows: () => openWorkflowForm(), knowledge: () => openSopForm(),
      team: () => openUserForm(),
    };
    (map[v] || (() => newCall()))();
  }

  /* ============================ BOOT ============================ */
  async function startApp() {
    $('#login').classList.add('hidden'); $('#login').innerHTML = '';
    $('#app').classList.remove('hidden');
    setLang(lang);
    nav('home');
  }
  async function boot() {
    document.documentElement.setAttribute('data-theme', localStorage.getItem('otto_theme') || 'light');
    await load();
    // Try cloud pull on boot if configured (best-effort).
    if (fbConfig()) { try { await cloudPull(); } catch (e) { } }
    const sid = localStorage.getItem('otto_session');
    if (sid) { session = get('users', sid); }
    if (session) startApp(); else showLogin();
    if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('./sw.js'); } catch (e) { } }
  }
  function setSearch(key, val) { _search[key] = val; render(); }
  function saveAIKey() { localStorage.setItem('otto_ai_key', ($('#set-aikey').value || '').trim()); toast(t('saved'), 'success'); }
  // expose functions used in inline handlers
  Object.assign(window, { setSearch, saveAIKey, t, toast, closeModal, modal,
    setLang, nav, back, signOut, quickAdd, openMore, get, remove, update, confirmDel, render,
    newCall, saveCall, jobFromCall, openCallView, openCustomerForm, saveCustomer, openJobForm, saveJob, changeJobStatus, setJobStatus,
    openNoteForm, saveNote, quickPhoto, chooseJob, runJobAction, uploadDoc, openDoc, quickVoiceNote, voiceInto,
    openEstimateForm, saveEstimate, estimateToInvoice, openInvoiceForm, saveInvoice, openInvoiceView, openPaymentForm, savePayment,
    openCheckForm, saveCheck, quickScanCheck, openFollowForm, saveFollow, toggleFollow, openWorkflow, openWorkflowForm, saveWorkflow,
    openSop, openSopForm, saveSop, shareLocation, exportCSV, exportQuickBooks, openUserForm, saveUser, toggleTheme, saveFirebase,
    cloudPullNow, exportAll, importAll, askAssistant });
  boot();
  </script>
