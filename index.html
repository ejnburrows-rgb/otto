<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b5cab">
    <title>O.T.T.O. Plumbing CRM</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
/* === THEME VARS === */
:root {
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef2f9; --surface:#ffffff;
  --line:#e2e8f0; --line2:#cfd8e6;
  --text:#13233b; --text2:#5a6b85; --text3:#90a0b8;
  --brand:#0b5cab; --brand2:#1477d6; --brand-soft:#e7f0fb;
  --green:#0a8f4f; --green-soft:#e3f6ec; --amber:#b9770a; --amber-soft:#fdf2dc;
  --red:#c52f33; --red-soft:#fbe6e6; --purple:#6b4fd1;
  --radius:16px; --radius-s:11px; --sb:248px; --hdr:60px; --nav:66px;
  --shadow:0 1px 2px rgba(16,38,73,.06),0 4px 16px rgba(16,38,73,.06);
}
:root[data-theme="dark"] {
  --bg:#0a1322; --bg2:#0f1c30; --bg3:#13243d; --surface:#11203a;
  --line:#1d2f4d; --line2:#26395b;
  --text:#e7eefb; --text2:#9fb0cc; --text3:#65789a;
  --brand:#2f8fe8; --brand2:#54a6f2; --brand-soft:#15294a;
  --green:#34d27f; --green-soft:#10301f; --amber:#f0b542; --amber-soft:#33270c;
  --red:#f06a6e; --red-soft:#321518; --purple:#9c86ef;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
  font-size:16px; line-height:1.45; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea { font-family:inherit; font-size:inherit; color:inherit; }
button { cursor:pointer; border:none; background:none; }
a { color:var(--brand); text-decoration:none; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:8px; }
.hide { display:none !important; }

/* === LOCK SCREEN === */
#lock {
  position:fixed; inset:0; z-index:1000; background:linear-gradient(160deg,#0b5cab,#06325f);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.lock-card {
  background:var(--bg2); border-radius:24px; padding:30px 26px; width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.35); text-align:center;
}
.lock-logo { width:74px; height:74px; border-radius:20px; background:var(--brand); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:34px; margin:0 auto 14px; }
.lock-card h1 { font-size:22px; font-weight:800; letter-spacing:-.5px; }
.lock-card .sub { color:var(--text2); font-size:14px; margin:4px 0 20px; }
.who-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.who {
  border:2px solid var(--line); border-radius:14px; padding:14px 8px; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; gap:6px; font-weight:600; font-size:14px;
}
.who i { font-size:22px; color:var(--brand); }
.who.on { border-color:var(--brand); background:var(--brand-soft); }
.who small { color:var(--text3); font-weight:500; font-size:11px; }
#pinDots { display:flex; gap:12px; justify-content:center; margin:8px 0 16px; }
.pdot { width:15px; height:15px; border-radius:50%; border:2px solid var(--line2); }
.pdot.f { background:var(--brand); border-color:var(--brand); }
.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.key { aspect-ratio:1.7; border-radius:14px; background:var(--bg3); font-size:24px; font-weight:700; }
.key:active { background:var(--brand-soft); }
.lock-err { color:var(--red); font-size:13px; min-height:18px; margin-top:8px; font-weight:600; }

/* === APP SHELL === */
#app { display:none; height:100%; flex-direction:column; }
header {
  height:var(--hdr); min-height:var(--hdr); display:flex; align-items:center; gap:12px;
  padding:0 16px; background:var(--bg2); border-bottom:1px solid var(--line); z-index:50;
}
.brand { display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:-.4px; }
.brand .mark { width:34px; height:34px; border-radius:10px; background:var(--brand); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:17px; }
.brand .name { font-size:16px; } .brand .name small { display:block; font-size:10px; color:var(--text3); font-weight:600; letter-spacing:.5px; }
.search-wrap { flex:1; max-width:520px; position:relative; }
.search-wrap i { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text3); }
#globalSearch {
  width:100%; height:42px; border-radius:21px; border:1px solid var(--line); background:var(--bg);
  padding:0 16px 0 38px; outline:none;
}
#globalSearch:focus { border-color:var(--brand); }
.hdr-btns { display:flex; align-items:center; gap:8px; margin-left:auto; }
.icon-btn { width:42px; height:42px; border-radius:12px; background:var(--bg3); color:var(--text2);
  display:flex; align-items:center; justify-content:center; font-size:16px; position:relative; }
.icon-btn:hover { color:var(--brand); }
.lang-toggle { display:flex; background:var(--bg3); border-radius:12px; padding:3px; }
.lang-toggle button { padding:7px 12px; border-radius:9px; font-weight:700; font-size:13px; color:var(--text2); }
.lang-toggle button.on { background:var(--brand); color:#fff; }
.dot-badge { position:absolute; top:6px; right:7px; min-width:16px; height:16px; padding:0 4px; border-radius:8px;
  background:var(--red); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }

.body-row { flex:1; display:flex; overflow:hidden; }
nav.sidebar {
  width:var(--sb); min-width:var(--sb); background:var(--bg2); border-right:1px solid var(--line);
  padding:14px 12px; overflow-y:auto; display:flex; flex-direction:column; gap:3px;
}
.nav-link {
  display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:12px; font-weight:600;
  color:var(--text2); font-size:15px;
}
.nav-link i { width:22px; text-align:center; font-size:17px; }
.nav-link:hover { background:var(--bg3); color:var(--text); }
.nav-link.on { background:var(--brand-soft); color:var(--brand); }
.nav-link .nb { margin-left:auto; min-width:20px; height:20px; padding:0 6px; border-radius:10px; background:var(--red);
  color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.nav-sep { color:var(--text3); font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; padding:14px 14px 6px; }
.sidebar .who-mini { margin-top:auto; padding:12px 14px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px; font-size:13px; }
.who-mini .av { width:34px; height:34px; border-radius:50%; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }

main { flex:1; overflow-y:auto; padding:22px; }
.page { display:none; max-width:1180px; margin:0 auto; }
.page.on { display:block; }
.page-head { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.page-head h2 { font-size:24px; font-weight:800; letter-spacing:-.6px; }
.page-head .sub { color:var(--text2); font-size:14px; width:100%; margin-top:-6px; }
.page-head .spacer { flex:1; }

/* === BUTTONS === */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:0 18px; height:46px;
  border-radius:13px; font-weight:700; font-size:15px; background:var(--bg3); color:var(--text); white-space:nowrap; }
.btn:active { transform:scale(.97); }
.btn-pri { background:var(--brand); color:#fff; }
.btn-pri:hover { background:var(--brand2); }
.btn-ok { background:var(--green); color:#fff; }
.btn-danger { background:var(--red); color:#fff; }
.btn-ghost { background:transparent; border:1px solid var(--line2); }
.btn-lg { height:56px; font-size:17px; padding:0 24px; }
.btn-sm { height:38px; padding:0 13px; font-size:14px; border-radius:11px; }
.btn-block { width:100%; }

/* === CARDS / TILES === */
.tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-bottom:22px; }
.tile { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px;
  box-shadow:var(--shadow); }
.tile .k { font-size:13px; color:var(--text2); font-weight:600; display:flex; align-items:center; gap:8px; }
.tile .v { font-size:30px; font-weight:800; letter-spacing:-1px; margin-top:8px; }
.tile .v small { font-size:14px; font-weight:600; color:var(--text3); }
.tile i.ic { color:var(--brand); }

.big-actions { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.big-action { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px 16px;
  display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center; box-shadow:var(--shadow); }
.big-action:hover { border-color:var(--brand); }
.big-action .ico { width:56px; height:56px; border-radius:16px; background:var(--brand-soft); color:var(--brand);
  display:flex; align-items:center; justify-content:center; font-size:25px; }
.big-action span { font-weight:700; font-size:15px; }

.card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  margin-bottom:18px; overflow:hidden; }
.card-head { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
.card-head h3 { font-size:16px; font-weight:700; }
.card-head .spacer { flex:1; }
.card-body { padding:6px 0; }
.section-title { font-size:13px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.6px; margin:24px 0 12px; }

/* === LIST ROWS === */
.row-item { display:flex; align-items:center; gap:13px; padding:14px 18px; border-bottom:1px solid var(--line); }
.row-item:last-child { border-bottom:none; }
.row-item:hover { background:var(--bg3); }
.row-item .av { width:42px; height:42px; min-width:42px; border-radius:12px; background:var(--brand-soft); color:var(--brand);
  display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; }
.row-main { flex:1; min-width:0; }
.row-main .t { font-weight:700; font-size:15px; }
.row-main .s { color:var(--text2); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-right { text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }

/* === BADGES === */
.badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; }
.b-blue { background:var(--brand-soft); color:var(--brand); }
.b-green { background:var(--green-soft); color:var(--green); }
.b-amber { background:var(--amber-soft); color:var(--amber); }
.b-red { background:var(--red-soft); color:var(--red); }
.b-gray { background:var(--bg3); color:var(--text2); }

/* === FORMS === */
.field { margin-bottom:15px; }
.field label { display:block; font-size:13px; font-weight:700; color:var(--text2); margin-bottom:6px; }
.field input,.field select,.field textarea {
  width:100%; padding:13px 14px; border:1px solid var(--line2); border-radius:12px; background:var(--bg); outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus { border-color:var(--brand); }
.field textarea { resize:vertical; min-height:84px; }
.field .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.input-voice { position:relative; }
.input-voice .mic { position:absolute; right:8px; top:8px; width:34px; height:34px; border-radius:10px; background:var(--brand-soft); color:var(--brand); display:flex; align-items:center; justify-content:center; }
.input-voice .mic.rec { background:var(--red); color:#fff; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }

/* === MODAL === */
.modal-bg { position:fixed; inset:0; background:rgba(8,18,35,.55); z-index:300; display:none;
  align-items:flex-end; justify-content:center; padding:0; }
.modal-bg.on { display:flex; }
.modal { background:var(--bg2); width:100%; max-width:560px; max-height:94vh; border-radius:22px 22px 0 0;
  overflow-y:auto; box-shadow:0 -8px 40px rgba(0,0,0,.3); }
.modal-head { position:sticky; top:0; background:var(--bg2); padding:18px 20px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:10px; z-index:2; }
.modal-head h3 { font-size:18px; font-weight:800; flex:1; }
.modal-body { padding:18px 20px; }
.modal-foot { position:sticky; bottom:0; background:var(--bg2); padding:14px 20px; border-top:1px solid var(--line);
  display:flex; gap:10px; }
.modal-foot .btn { flex:1; }
@media(min-width:700px){ .modal-bg{ align-items:center; } .modal{ border-radius:22px; } }

/* === TOAST === */
#toasts { position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:500; display:flex; flex-direction:column; gap:8px; width:calc(100% - 28px); max-width:420px; }
.toast { background:var(--text); color:var(--bg2); padding:13px 16px; border-radius:13px; font-weight:600; font-size:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.25); display:flex; align-items:center; gap:10px; animation:slideDown .25s; }
.toast.ok { background:var(--green); color:#fff; } .toast.err { background:var(--red); color:#fff; } .toast.warn { background:var(--amber); color:#fff; }
@keyframes slideDown { from{ transform:translateY(-16px); opacity:0; } }

/* === FAB === */
#fab { position:fixed; right:20px; bottom:calc(var(--nav) + 18px); z-index:80; width:62px; height:62px; border-radius:20px;
  background:var(--brand); color:#fff; font-size:27px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px rgba(11,92,171,.45); }
#fab:active { transform:scale(.92); }
@media(min-width:860px){ #fab{ bottom:24px; } }

/* === BOTTOM NAV (mobile) === */
#bottomNav { display:none; height:var(--nav); background:var(--bg2); border-top:1px solid var(--line);
  align-items:center; justify-content:space-around; padding:0 4px; z-index:60; }
#bottomNav .bn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text3); font-size:10px; font-weight:600; padding:7px 0; }
#bottomNav .bn i { font-size:20px; }
#bottomNav .bn.on { color:var(--brand); }

.empty { text-align:center; padding:46px 20px; color:var(--text3); }
.empty i { font-size:42px; margin-bottom:12px; opacity:.5; display:block; }
.empty .t { font-weight:700; color:var(--text2); font-size:16px; }

.chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
.chip { padding:8px 15px; border-radius:20px; background:var(--bg3); font-weight:600; font-size:14px; white-space:nowrap; color:var(--text2); }
.chip.on { background:var(--brand); color:#fff; }

.detail-grid { display:grid; gap:14px; }
@media(min-width:760px){ .detail-grid.two{ grid-template-columns:1.4fr 1fr; align-items:start; } }
.kv { display:flex; padding:10px 0; border-bottom:1px solid var(--line); gap:10px; }
.kv .k { color:var(--text2); font-weight:600; min-width:120px; font-size:14px; }
.kv .v { font-weight:600; flex:1; }
.photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
.photo-grid img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px; border:1px solid var(--line); }
.doc-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); }
.doc-row .di { width:40px; height:40px; border-radius:10px; background:var(--brand-soft); color:var(--brand); display:flex; align-items:center; justify-content:center; font-size:18px; }

/* === CHAT === */
.chat-wrap { display:flex; flex-direction:column; height:calc(100vh - var(--hdr) - 90px); max-width:760px; margin:0 auto; }
.chat-msgs { flex:1; overflow-y:auto; padding:10px 4px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:84%; padding:12px 15px; border-radius:16px; font-size:15px; line-height:1.5; white-space:pre-wrap; }
.msg.user { align-self:flex-end; background:var(--brand); color:#fff; border-bottom-right-radius:5px; }
.msg.bot { align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:5px; }
.chat-input { display:flex; gap:10px; padding:12px 4px 4px; }
.chat-input input { flex:1; height:50px; border-radius:25px; border:1px solid var(--line2); background:var(--bg); padding:0 18px; outline:none; }
.chat-input input:focus { border-color:var(--brand); }
.chat-sugg { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }

/* === RESPONSIVE === */
@media(max-width:860px){
  nav.sidebar { display:none; }
  main { padding:16px 14px 20px; }
  #bottomNav { display:flex; }
  header { padding:0 12px; }
  .brand .name { display:none; }
  .page-head h2 { font-size:21px; }
  .lang-toggle button { padding:7px 10px; }
}
@media(max-width:420px){ .field .row2,.field-row{ grid-template-columns:1fr; } }
.spin { animation:spin 1s linear infinite; } @keyframes spin{ to{ transform:rotate(360deg);} }
hr.sep { border:none; border-top:1px solid var(--line); margin:14px 0; }
    </style>
</head>

<body>
<!-- LOCK SCREEN -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-logo"><i class="fas fa-wrench"></i></div>
    <h1>O.T.T.O. Plumbing</h1>
    <div class="sub" id="lockSub">Choose who you are, then enter your PIN</div>
    <div class="who-grid" id="whoGrid"></div>
    <div id="pinDots"></div>
    <div class="keypad" id="keypad"></div>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="brand">
      <div class="mark"><i class="fas fa-wrench"></i></div>
      <div class="name">O.T.T.O.<small>PLUMBING CRM</small></div>
    </div>
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input id="globalSearch" placeholder="Search" autocomplete="off" oninput="onSearch()">
    </div>
    <div class="hdr-btns">
      <div class="lang-toggle">
        <button id="lang-en" onclick="setLang('en')">EN</button>
        <button id="lang-es" onclick="setLang('es')">ES</button>
      </div>
      <button class="icon-btn" id="gpsBtn" onclick="toggleTracking()" title="Location"><i class="fas fa-location-crosshairs"></i></button>
      <button class="icon-btn" onclick="toggleTheme()" title="Theme"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" onclick="lockNow()" title="Lock"><i class="fas fa-lock"></i></button>
    </div>
  </header>

  <div class="body-row">
    <nav class="sidebar" id="sidebar"></nav>
    <main id="main"></main>
  </div>

  <div id="bottomNav"></div>
</div>

<button id="fab" onclick="openQuickAdd()"><i class="fas fa-plus"></i></button>

<!-- search results dropdown -->
<div id="searchPanel" class="hide"></div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div id="toasts"></div>
<script>
/* ============ I18N ============ */
const T = {
  en: {
    'app.tagline':'Operating system for your plumbing company',
    'lock.sub':'Choose who you are, then enter your PIN',
    'lock.setPin':'Set a 4-digit PIN for','lock.enterPin':'Enter PIN for','lock.wrong':'Wrong PIN, try again','lock.locked':'Too many tries. Wait {s}s',
    'nav.work':'Work','nav.money':'Money','nav.knowledge':'Knowledge','nav.admin':'Admin',
    'nav.today':'Today','nav.jobs':'Jobs','nav.customers':'Customers','nav.calls':'Calls',
    'nav.estimates':'Estimates & Invoices','nav.checks':'Payments & Checks','nav.followups':'Follow-ups',
    'nav.workflows':'Workflows','nav.sops':'How-To & SOPs','nav.map':'Worker Map','nav.assistant':'Assistant',
    'nav.reports':'Reports','nav.settings':'Settings',
    'today.hello':'Hi','today.subtitle':"Here's what needs attention",
    'today.jobsToday':'Jobs Today','today.openJobs':'Open Jobs','today.followups':'Follow-ups Due','today.unpaid':'Unpaid','today.collected':'Collected (mo)',
    'today.schedule':"Today's Jobs",'today.dueFollowups':'Follow-ups Due','today.recentCalls':'Recent Calls','today.nothing':'All clear — nothing due',
    'qa.title':'What do you want to do?','qa.newCall':'Log a Call','qa.newCallSub':'Creates customer + job',
    'qa.newJob':'New Job','qa.newCustomer':'New Customer','qa.voiceNote':'Voice Note','qa.voiceNoteSub':'Speak an update',

function t(k,vars){ let s=(T[lang]&&T[lang][k])||(T.en[k])||k; if(vars)for(const v in vars)s=s.replace('{'+v+'}',vars[v]); return s; }
function L(en,es){ return lang==='es'?es:en; }

function blankData(){
  return {
    customers:[], jobs:[], calls:[], notes:[], photos:[], documents:[],
    estimates:[], invoices:[], payments:[], checks:[], followups:[],
    workflows:[], sops:[], users:[], locations:[], folders:[], notifications:[],

  };
}

/* ============ STORAGE ============ */
const LS_KEY='otto-crm-data';
function saveData(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(appData)); }catch(e){ console.error(e); }
  if(appData.settings.qbConnected) {/* QB sync hook */}
}
let _saveTimer=null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer=setTimeout(()=>{ saveData(); _bk++; if(_bk%8===0)autoBackup(); },500); }
function loadData(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ appData=JSON.parse(raw); migrate(); return; } }catch(e){}
  appData=blankData(); seed(); saveData();
}
function migrate(){ const d=blankData(); for(const k in d) if(appData[k]===undefined) appData[k]=d[k];
  for(const k in d.settings) if(appData.settings[k]===undefined) appData.settings[k]=d.settings[k]; }

/* IndexedDB for file blobs (photos, docs, check images) */
let _fdb=null;
function fileDB(){ return new Promise(res=>{ if(_fdb)return res(_fdb); const r=indexedDB.open('otto-files',1);
  r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains('files'))db.createObjectStore('files'); };
  r.onsuccess=e=>{ _fdb=e.target.result; res(_fdb); }; r.onerror=()=>res(null); }); }
async function putFile(id,dataUrl){ const db=await fileDB(); if(!db)return; return new Promise(res=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put(dataUrl,id); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }
async function getFile(id){ const db=await fileDB(); if(!db)return null; return new Promise(res=>{ const tx=db.transaction('files','readonly'); const rq=tx.objectStore('files').get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
async function delFile(id){ const db=await fileDB(); if(!db)return; const tx=db.transaction('files','readwrite'); tx.objectStore('files').delete(id); }

/* Auto-backup */
let _bk=0;
function backupDB(){ return new Promise(res=>{ const r=indexedDB.open('otto-backups',1);
  r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains('bk'))db.createObjectStore('bk',{keyPath:'id',autoIncrement:true}); };
  r.onsuccess=e=>res(e.target.result); r.onerror=()=>res(null); }); }
async function autoBackup(){ try{ const db=await backupDB(); if(!db)return; const tx=db.transaction('bk','readwrite'); const s=tx.objectStore('bk');
  s.add({ ts:new Date().toISOString(), data:JSON.stringify(appData) });
  const all=s.getAll(); all.onsuccess=()=>{ const a=all.result; if(a.length>6){ const tx2=db.transaction('bk','readwrite'); a.slice(0,a.length-6).forEach(b=>tx2.objectStore('bk').delete(b.id)); } }; }catch(e){} }

/* ============ HELPERS ============ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ n=Number(n)||0; return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d)return '—'; const x=new Date(d); if(isNaN(x))return esc(d); return x.toLocaleDateString(lang==='es'?'es-MX':'en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTime(d){ if(!d)return '—'; const x=new Date(d); return x.toLocaleDateString(lang==='es'?'es-MX':'en-US',{month:'short',day:'numeric'})+' '+x.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function timeAgo(d){ const m=Math.floor((Date.now()-new Date(d).getTime())/60000); if(m<1)return t('gen.justNow'); if(m<60)return m+'m'; const h=Math.floor(m/60); if(h<24)return h+'h'; return Math.floor(h/24)+'d'; }
function byId(arr,id){ return appData[arr].find(x=>x.id===id); }
function custName(id){ const c=byId('customers',id); return c?c.name:'—'; }
function userName(id){ if(!id)return t('gen.unassigned'); const u=byId('users',id); return u?u.name:id; }
function statusBadge(s){ const map={ new:'b-blue',scheduled:'b-blue',inprogress:'b-amber',onhold:'b-gray',done:'b-green',cancelled:'b-gray',
  draft:'b-gray',sent:'b-blue',approved:'b-green',paid:'b-green',unpaid:'b-amber',partial:'b-amber',overdue:'b-red',open:'b-amber',pending:'b-amber' };
  return `<span class="badge ${map[s]||'b-gray'}">${esc(t('st.'+s)||s)}</span>`; }
function prBadge(p){ const map={low:'b-gray',normal:'b-blue',high:'b-amber',emergency:'b-red'}; return `<span class="badge ${map[p]||'b-gray'}">${esc(t('pr.'+p)||p)}</span>`; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

};
const BOTTOM_NAV = {
  owner:['today','jobs','customers','checks','assistant'],
  office:['today','jobs','customers','followups','assistant'],
  field:['today','jobs','followups','sops','assistant'],
  accounting:['today','estimates','checks','reports','assistant'],
};
function canSee(page){ return me && ROLE_PAGES[me.role] && ROLE_PAGES[me.role].includes(page); }

function renderNav(){
  const pages=ROLE_PAGES[me.role]||[];
  // sidebar grouped
  const groups={work:[],money:[],knowledge:[],admin:[]};
  let html=`<div class="nav-link ${currentPage==='today'?'on':''}" onclick="go('today')"><i class="fas fa-house"></i> ${t('nav.today')}</div>`;
  pages.forEach(p=>{ if(p==='today')return; const g=PAGES[p].group; if(g)groups[g].push(p); });
  for(const g of ['work','money','knowledge','admin']){
    if(!groups[g].length)continue;
    html+=`<div class="nav-sep">${t('nav.'+g)}</div>`;
    groups[g].forEach(p=>{ const badge=navBadge(p); html+=`<div class="nav-link ${currentPage===p?'on':''}" onclick="go('${p}')"><i class="fas ${PAGES[p].icon}"></i> ${t('nav.'+p)}${badge}</div>`; });
  }
  html+=`<div class="who-mini"><div class="av">${initials(me.name)}</div><div><div style="font-weight:700">${esc(me.name)}</div><div style="color:var(--text3);font-size:12px">${t('role.'+me.role)}</div></div></div>`;
  document.getElementById('sidebar').innerHTML=html;
  // bottom nav
  const bn=(BOTTOM_NAV[me.role]||[]).filter(canSee);
  document.getElementById('bottomNav').innerHTML=bn.map(p=>`<div class="bn ${currentPage===p?'on':''}" onclick="go('${p}')"><i class="fas ${PAGES[p].icon}"></i>${t('nav.'+p)}</div>`).join('');
}
function navBadge(p){
  let n=0;
  if(p==='followups') n=appData.followups.filter(f=>f.status!=='done' && f.due<=today()).length;
  if(p==='checks') n=0;
  return n>0?`<span class="nb">${n}</span>`:'';
}

/* ============ ROUTER ============ */
function go(page){
  if(!canSee(page))page='today';

}

let pinBuf='', pinUser=null, _lockTries=0, _lockUntil=0;
function renderLock(){
  document.getElementById('lockSub').textContent=t('lock.sub');
  const grid=document.getElementById('whoGrid');
  grid.innerHTML=(appData.users||[]).map(u=>`<div class="who ${pinUser===u.id?'on':''}" onclick="pickUser('${u.id}')">
    <i class="fas ${u.role==='owner'?'fa-crown':u.role==='office'?'fa-headset':u.role==='accounting'?'fa-calculator':'fa-helmet-safety'}"></i>
    ${esc(u.name)}<small>${t('role.'+u.role)}</small></div>`).join('');
  renderDots(); buildKeypad();
}
function buildKeypad(){
  const k=document.getElementById('keypad');
  k.innerHTML=[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" onclick="pinPress('${n}')">${n}</button>`).join('')
    +`<button class="key" onclick="pinClear()"><i class="fas fa-xmark"></i></button>`
    +`<button class="key" onclick="pinPress('0')">0</button>`
    +`<button class="key" onclick="pinBack()"><i class="fas fa-delete-left"></i></button>`;
}
function renderDots(){ document.getElementById('pinDots').innerHTML=[0,1,2,3].map(i=>`<div class="pdot ${i<pinBuf.length?'f':''}"></div>`).join(''); }
function pickUser(id){ pinUser=id; pinBuf=''; document.getElementById('lockErr').textContent=''; const u=byId('users',id);
  document.getElementById('lockSub').textContent=(u.pin?t('lock.enterPin'):t('lock.setPin'))+' '+u.name; renderLock(); }
function pinPress(n){ if(!pinUser){ document.getElementById('lockErr').textContent=L('Pick who you are first','Elige quién eres primero'); return; }
  if(Date.now()<_lockUntil)return; if(pinBuf.length>=4)return; pinBuf+=n; renderDots(); if(pinBuf.length===4)setTimeout(checkPin,150); }
function pinBack(){ pinBuf=pinBuf.slice(0,-1); renderDots(); }
function pinClear(){ pinBuf=''; renderDots(); }
function checkPin(){
  const u=byId('users',pinUser);
  if(!u.pin){ u.pin=pinBuf; saveData(); enterApp(u); return; }
  if(u.pin===pinBuf){ _lockTries=0; enterApp(u); }
  else { _lockTries++; pinBuf=''; renderDots();
    if(_lockTries>=5){ _lockUntil=Date.now()+15000; let s=15; document.getElementById('lockErr').textContent=t('lock.locked',{s});
      const iv=setInterval(()=>{ s--; if(s<=0){ clearInterval(iv); _lockTries=0; document.getElementById('lockErr').textContent=''; } else document.getElementById('lockErr').textContent=t('lock.locked',{s}); },1000); }
    else document.getElementById('lockErr').textContent=t('lock.wrong'); }
}
function enterApp(u){
  me=u; if(u.lang){ lang=u.lang; localStorage.setItem('otto-lang',lang);
    document.getElementById('lang-en').classList.toggle('on',lang==='en'); document.getElementById('lang-es').classList.toggle('on',lang==='es'); }
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('fab').style.display='flex';
  pinBuf=''; pinUser=null;
  currentPage='today'; renderNav(); render();
}

function voiceInput(id,value){ return `<div class="input-voice"><input id="${id}" value="${esc(value||'')}" style="padding-right:48px">
  <button type="button" class="mic" id="${id}-mic" onclick="dictate('${id}')"><i class="fas fa-microphone"></i></button></div>`; }
function voiceTextarea(id,value){ return `<div class="input-voice"><textarea id="${id}" style="padding-right:48px">${esc(value||'')}</textarea>
  <button type="button" class="mic" id="${id}-mic" onclick="dictate('${id}')"><i class="fas fa-microphone"></i></button></div>`; }
let _rec=null,_recTarget=null;
function speechAvail(){ return 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window; }
function dictate(targetId){
  if(!speechAvail()){ toast(L('Voice not supported on this device','La voz no funciona en este dispositivo'),'warn'); return; }
  const mic=document.getElementById(targetId+'-mic');
  if(_rec){ _rec.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _rec=new SR(); _rec.lang=lang==='es'?'es-MX':'en-US'; _rec.interimResults=true; _rec.continuous=false; _recTarget=targetId;
  if(mic)mic.classList.add('rec');
  const el=document.getElementById(targetId); const base=el?el.value:'';
  _rec.onresult=e=>{ let txt=''; for(let i=0;i<e.results.length;i++)txt+=e.results[i][0].transcript;
    if(el)el.value=(base?base+' ':'')+txt; };
  _rec.onerror=()=>{ };
  _rec.onend=()=>{ if(mic)mic.classList.remove('rec'); _rec=null; };
  toast(t('voice.listening'));
  _rec.start();
}
function invTotal(inv){ return (inv.items||[]).reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.price)||0),0); }
function estTotal(e){ return invTotal(e); }

function saveJob(id){
  const customerId=val('jf-cust'), title=val('jf-title');
  if(!customerId||!title){ toast(t('toast.fillRequired'),'err'); return; }
  let j=id?byId('jobs',id):null;
  const oldStatus=j?j.status:null;
  const assign=val('jf-assign');
  const data={ customerId, title, type:val('jf-type'), priority:val('jf-pri'), status:val('jf-status'),
    scheduled:val('jf-sched'), assignedTo:assign?[assign]:[], address:val('jf-addr'), value:Number(val('jf-value'))||0, description:val('jf-desc') };
  if(j){ Object.assign(j,data); }
  else { const num=appData.settings.jobCounter++; const folderId=uid();
    j={id:uid(),number:num,createdAt:Date.now(),folderId,...data};
    appData.folders.push({id:folderId,jobId:j.id,name:`#${num} ${title}`});
    appData.jobs.push(j); }
  // workflow: status change → notify office
  if(oldStatus&&oldStatus!==data.status && wfActive('job.status')){ notifyOffice(L(`Job #${j.number} is now `,`Trabajo #${j.number} ahora está `)+t('st.'+data.status)); }
  // workflow: completed → follow-up
  if(data.status==='done' && oldStatus!=='done' && wfActive('job.completed')){
    appData.followups.push({id:uid(),jobId:j.id,customerId,due:today(),task:L('Follow up on completed job: ','Seguimiento de trabajo terminado: ')+title,status:'open',assignedTo:null});
    toast(L('Follow-up created for completed job','Seguimiento creado'),'ok');
  }
  scheduleSave(); closeModal(); toast(id?t('toast.saved'):t('toast.jobCreated'),'ok');
  if(id)openJob(j.id); else if(currentPage==='jobs')render(); else openJob(j.id);
}

/* image helpers */
function fileToDataUrl(f){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(f); }); }
function compressImage(f,max=1280,q=0.72){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{
  let{width:w,height:h}=img; if(w>h&&w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
  res(cv.toDataURL('image/jpeg',q)); }; img.src=r.result; }; r.readAsDataURL(f); }); }

function saveCall(){
  let custId=val('cl-cust'); const summary=val('cl-summary');
  if(custId==='__new'){ const name=val('cl-name'); if(!name){ toast(t('toast.fillRequired'),'err'); return; }

    appData.customers.push(c); custId=c.id; }
  const call={id:uid(),customerId:custId,jobId:null,direction:val('cl-dir'),date:new Date().toISOString(),summary,by:me.id};
  appData.calls.push(call);
  const makeJob=document.getElementById('cl-makeJob').checked;
  if(makeJob && wfActive('call.logged')){ const c=byId('customers',custId); const num=appData.settings.jobCounter++; const folderId=uid();
    const title=val('cl-jobTitle')||summary.slice(0,50)||L('New service call','Nueva llamada de servicio');
    appData.folders.push({id:folderId,jobId:'pending',name:`#${num} ${title}`});
    const job={id:uid(),number:num,customerId:custId,title,type:'Service',priority:'normal',status:'new',assignedTo:[],scheduled:today(),address:c.address||'',value:0,description:summary,folderId,createdAt:Date.now()};
    const fol=byId('folders',folderId); fol.jobId=job.id;
    appData.jobs.push(job); call.jobId=job.id;
    scheduleSave(); closeModal(); toast(t('toast.jobCreated'),'ok'); openJob(job.id); return;

  scheduleSave(); closeModal(); toast(t('toast.saved'),'ok'); render();

function renderFollowups(m){
  const td=today();
  const items=[...appData.followups];
  const groups={overdue:[],today:[],upcoming:[],done:[]};
  items.forEach(f=>{ if(f.status==='done')groups.done.push(f); else if(f.due<td)groups.overdue.push(f); else if(f.due===td)groups.today.push(f); else groups.upcoming.push(f); });
  const sec=(key,arr,color)=>arr.length?`<div class="section-title" style="color:${color}">${t('fu.'+key)} (${arr.length})</div>
    <div class="card"><div class="card-body">${arr.sort((a,b)=>a.due.localeCompare(b.due)).map(fuRow).join('')}</div></div>`:'';
  m.innerHTML=`<div class="page on">
    <div class="page-head"><h2>${t('fu.title')}</h2><div class="spacer"></div>
      <button class="btn btn-pri" onclick="fuForm()"><i class="fas fa-plus"></i> ${t('qa.followup')}</button>
      <div class="sub">${t('fu.sub')}</div></div>
    ${ (groups.overdue.length+groups.today.length+groups.upcoming.length+groups.done.length)===0 ?
      `<div class="empty"><i class="fas fa-bell-slash"></i><div class="t">${t('fu.none')}</div></div>` :
      sec('overdue',groups.overdue,'var(--red)')+sec('today',groups.today,'var(--amber)')+sec('upcoming',groups.upcoming,'var(--text3)')+sec('done',groups.done,'var(--green)') }
  </div>`;
}

/* ============ MONEY (Estimates + Invoices) ============ */
let moneyTab='inv';
function renderMoney(m){
  const ests=[...appData.estimates].sort((a,b)=>b.number-a.number);
  const invs=[...appData.invoices].sort((a,b)=>b.number-a.number);
  const outstanding=invs.filter(i=>i.status!=='paid').reduce((s,i)=>s+balanceOf(i),0);
  m.innerHTML=`<div class="page on">
    <div class="page-head"><h2>${t('money.title')}</h2><div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV('${moneyTab==='inv'?'invoices':'estimates'}')"><i class="fas fa-file-csv"></i> ${t('btn.export')}</button>
      <button class="btn btn-pri" onclick="${moneyTab==='inv'?"invForm()":"estForm()"}"><i class="fas fa-plus"></i> ${moneyTab==='inv'?t('qa.newInvoice'):t('qa.newEstimate')}</button>
      <div class="sub">${t('money.sub')}</div></div>
    <div class="tiles" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
      ${tile('rep.outstanding','fa-hourglass-half',money(outstanding),null)}
      ${tile('inv','fa-file-invoice',invs.length,null)}
      ${tile('est','fa-file-lines',ests.length,null)}
    </div>
    <div class="chips"><div class="chip ${moneyTab==='inv'?'on':''}" onclick="moneyTab='inv';render()">${t('inv')}</div>
      <div class="chip ${moneyTab==='est'?'on':''}" onclick="moneyTab='est';render()">${t('est')}</div></div>
    <div class="card"><div class="card-body">
      ${ moneyTab==='inv'
        ? (invs.length?invs.map(invRow).join(''):`<div class="empty"><i class="fas fa-file-invoice"></i><div class="t">${t('money.none')}</div></div>`)
        : (ests.length?ests.map(estRow).join(''):`<div class="empty"><i class="fas fa-file-lines"></i><div class="t">${t('money.none')}</div></div>`) }
    </div></div></div>`;
}
function balanceOf(inv){ const paid=appData.payments.filter(p=>p.invoiceId===inv.id).reduce((s,p)=>s+(Number(p.amount)||0),0); return invTotal(inv)-paid; }
function invRow(i){ return `<div class="row-item" onclick="openInvoice('${i.id}')"><div class="av" style="background:var(--brand-soft);color:var(--brand)"><i class="fas fa-file-invoice"></i></div>
  <div class="row-main"><div class="t">#${i.number} · ${esc(custName(i.customerId))}</div><div class="s">${fmtDate(i.date)} · ${t('f.dueDate')}: ${fmtDate(i.dueDate)}</div></div>
  <div class="row-right"><div style="font-weight:800">${money(invTotal(i))}</div>${statusBadge(invStatus(i))}</div></div>`; }
function estRow(e){ return `<div class="row-item" onclick="openEstimate('${e.id}')"><div class="av" style="background:var(--brand-soft);color:var(--brand)"><i class="fas fa-file-lines"></i></div>
  <div class="row-main"><div class="t">#${e.number} · ${esc(custName(e.customerId))}</div><div class="s">${fmtDate(e.date)}</div></div>
  <div class="row-right"><div style="font-weight:800">${money(estTotal(e))}</div>${statusBadge(e.status)}</div></div>`; }
function invStatus(i){ if(i.status==='paid')return 'paid'; const bal=balanceOf(i); if(bal<=0)return 'paid'; if(bal<invTotal(i))return 'partial';
  if(i.dueDate&&i.dueDate<today())return 'overdue'; return 'unpaid'; }

/* line-item editor */
function lineItemsEditor(prefix,items){ items=items&&items.length?items:[{item:'',qty:1,price:0}];
  return `<div id="${prefix}-items">${items.map((it,i)=>lineItemRow(prefix,it,i)).join('')}</div>
    <button class="btn btn-sm btn-ghost" onclick="addLineItem('${prefix}')"><i class="fas fa-plus"></i> ${t('f.item')}</button>
    <div style="text-align:right;font-weight:800;margin-top:10px;font-size:18px" id="${prefix}-total">${money(0)}</div>`; }
function lineItemRow(prefix,it,i){ return `<div class="field-row" data-li style="grid-template-columns:2fr 60px 90px 30px;align-items:end;margin-bottom:8px">
  <div><input class="${prefix}-it" placeholder="${t('f.item')}" value="${esc(it.item||'')}" oninput="recalc('${prefix}')"></div>
  <div><input class="${prefix}-qty" inputmode="decimal" placeholder="${t('f.qty')}" value="${it.qty||1}" oninput="recalc('${prefix}')"></div>
  <div><input class="${prefix}-pr" inputmode="decimal" placeholder="${t('f.price')}" value="${it.price||0}" oninput="recalc('${prefix}')"></div>
  <button class="btn btn-sm btn-ghost" onclick="this.parentElement.remove();recalc('${prefix}')"><i class="fas fa-xmark"></i></button></div>`; }
function addLineItem(prefix){ const c=document.getElementById(prefix+'-items'); const d=document.createElement('div'); d.innerHTML=lineItemRow(prefix,{item:'',qty:1,price:0}); c.appendChild(d.firstChild); }
function collectItems(prefix){ const rows=document.querySelectorAll('#'+prefix+'-items [data-li]'); const items=[];
  rows.forEach(r=>{ const item=r.querySelector('.'+prefix+'-it').value.trim(); const qty=Number(r.querySelector('.'+prefix+'-qty').value)||0; const price=Number(r.querySelector('.'+prefix+'-pr').value)||0; if(item)items.push({item,qty,price}); }); return items; }
function recalc(prefix){ const tot=collectItems(prefix).reduce((s,i)=>s+i.qty*i.price,0); const el=document.getElementById(prefix+'-total'); if(el)el.textContent=money(tot); }

function estForm(jobId,id){

function openEstimate(id){ const e=byId('estimates',id);

function convertToInvoice(estId){ const e=byId('estimates',estId);

function invForm(jobId,id){
  const inv=id?byId('invoices',id):{}; const cust=appData.customers.sort((a,b)=>a.name.localeCompare(b.name));
  const j=jobId?byId('jobs',jobId):null;

function saveInv(id,jobId){ const items=collectItems('if'); if(!items.length){ toast(t('toast.fillRequired'),'err'); return; }

  scheduleSave(); closeModal(); toast(t('toast.saved'),'ok'); if(jobId)openJob(jobId); else render(); }
function openInvoice(id){ const inv=byId('invoices',id); const pays=appData.payments.filter(p=>p.invoiceId===id);

function docDetail(o,total,status){ return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

/* DXF — pure, synchronous, no DOM/network. The actual calculation engine: real coordinates in, real lengths/counts out. */
function parseDxf(text){
  try{
    const lines=text.split(/\r\n|\r|\n/);
    if(lines.length>500000)return {ok:false,error:'toolarge'};
    const pairs=[];
    for(let i=0;i+1<lines.length;i+=2){
      const code=parseInt(lines[i].trim(),10);
      if(isNaN(code))return {ok:false,error:'parse'};
      pairs.push([code,lines[i+1].trim()]);
    }
    if(!pairs.length)return {ok:false,error:'empty'};

    const UNIT_LABELS={1:'in',2:'ft',4:'mm',5:'cm',6:'m'};
    const ENTITY_TYPES=['LINE','LWPOLYLINE','CIRCLE','ARC','INSERT'];
    let section=null, expectSectionName=false, units=null, cur=null, pendingX=null;
    const rawEntities=[];
    function endEntity(){ if(cur)rawEntities.push(cur); cur=null; pendingX=null; }

    for(let i=0;i<pairs.length;i++){
      const code=pairs[i][0], val=pairs[i][1];
      if(code===0){
        endEntity();
        if(val==='SECTION'){ expectSectionName=true; section=null; }
        else if(val==='ENDSEC'){ section=null; }
        else if(val==='EOF'){ break; }
        else if(section==='ENTITIES' && ENTITY_TYPES.includes(val)){ cur={type:val,layer:null,verts:[],flags:0}; }
        continue;
      }
      if(expectSectionName){ section=val; expectSectionName=false; continue; }
      if(section==='HEADER' && code===9 && val==='$INSUNITS'){
        const next=pairs[i+1];
        if(next && next[0]===70) units=UNIT_LABELS[parseInt(next[1],10)]||null;
        continue;
      }
      if(section!=='ENTITIES' || !cur)continue;
      if(code===8){ cur.layer=val; continue; }
      if(cur.type==='LWPOLYLINE'){
        if(code===10){ pendingX=parseFloat(val); continue; }
        if(code===20){ cur.verts.push([pendingX,parseFloat(val)]); pendingX=null; continue; }
        if(code===70){ cur.flags=parseInt(val,10)||0; continue; }
      } else if(cur.type==='LINE'){
        if(code===10){ cur.x1=parseFloat(val); continue; }
        if(code===20){ cur.y1=parseFloat(val); continue; }
        if(code===11){ cur.x2=parseFloat(val); continue; }
        if(code===21){ cur.y2=parseFloat(val); continue; }
      } else if(cur.type==='CIRCLE'){
        if(code===40){ cur.radius=parseFloat(val); continue; }
      } else if(cur.type==='ARC'){
        if(code===40){ cur.radius=parseFloat(val); continue; }
        if(code===50){ cur.a1=parseFloat(val); continue; }
        if(code===51){ cur.a2=parseFloat(val); continue; }
      } else if(cur.type==='INSERT'){
        if(code===2){ cur.block=val; continue; }
      }
    }
    endEntity();
    if(!rawEntities.length)return {ok:false,error:'empty'};

    const lengthsByLayer={}, fixturesByBlock={};
    const counts={lines:0,polylines:0,circles:0,arcs:0,inserts:0};
    function addLen(layer,len){ if(!len||isNaN(len))return; const k=layer||'(none)'; lengthsByLayer[k]=(lengthsByLayer[k]||0)+len; }

    for(const e of rawEntities){
      if(e.type==='LINE' && e.x1!=null && e.y1!=null && e.x2!=null && e.y2!=null){
        counts.lines++; addLen(e.layer,Math.hypot(e.x2-e.x1,e.y2-e.y1));
      } else if(e.type==='LWPOLYLINE' && e.verts.length>1){
        counts.polylines++; let len=0;
        for(let i=1;i<e.verts.length;i++)len+=Math.hypot(e.verts[i][0]-e.verts[i-1][0],e.verts[i][1]-e.verts[i-1][1]);
        if(e.flags&1){ const a=e.verts[0],b=e.verts[e.verts.length-1]; len+=Math.hypot(b[0]-a[0],b[1]-a[1]); }
        addLen(e.layer,len);
      } else if(e.type==='CIRCLE'){
        counts.circles++;
      } else if(e.type==='ARC' && e.radius!=null && e.a1!=null && e.a2!=null){
        counts.arcs++; let delta=e.a2-e.a1; while(delta<0)delta+=360; while(delta>360)delta-=360;
        addLen(e.layer,e.radius*(delta*Math.PI/180));
      } else if(e.type==='INSERT' && e.block){
        counts.inserts++; fixturesByBlock[e.block]=(fixturesByBlock[e.block]||0)+1;
      }
    }

    const lengthsByLayerArr=Object.keys(lengthsByLayer).map(k=>({layer:k,length:lengthsByLayer[k]})).sort((a,b)=>b.length-a.length);
    const fixturesByBlockArr=Object.keys(fixturesByBlock).map(k=>({block:k,count:fixturesByBlock[k]})).sort((a,b)=>b.count-a.count);
    return {ok:true,units,lengthsByLayer:lengthsByLayerArr,fixturesByBlock:fixturesByBlockArr,entities:counts};
  }catch(e){ return {ok:false,error:'parse'}; }
}

async function narrateDxfGeometry(parsed){
  const prov=cadAiProvider(); if(!prov)return null;
  const unitLabel=parsed.units||t('cad.drawingUnits');
  const prompt='You are summarizing a parsed AutoCAD DXF drawing for a plumbing company owner. '+
    'Units: '+unitLabel+'. Lengths by layer (already computed exactly): '+JSON.stringify(parsed.lengthsByLayer)+'. '+
    'Fixture/block counts (already computed exactly): '+JSON.stringify(parsed.fixturesByBlock)+'. '+
    'Entity totals: '+JSON.stringify(parsed.entities)+'. '+
    'Write a short plain-language summary (3-5 sentences) useful to a plumber: total length per relevant layer, fixture counts, anything notable. Use only the exact numbers given, do not invent new ones. '+
    'Reply ONLY in '+(lang==='es'?'Spanish':'English')+', plain text, no markdown.';
  if(prov.provider==='nvidia')return await nvidiaChat([{role:'user',content:prompt}],700);
  return await anthropicText(prompt,700);
}

async function analyzeDrawingImage(dataUrl){
  const prov=cadAiProvider(); if(!prov)return null;
  const prompt='This image shows a plumbing or construction drawing or sketch. Identify: (1) visible fixture symbols and counts (sinks, toilets, drains, valves, water heaters, etc.), '+
    '(2) any printed or handwritten dimension numbers visible, (3) visible pipe runs or materials called out. '+
    'Return JSON only, no other text: {"summary":"...","fixtureCounts":[{"label":"...","count":0}],"measurements":[{"label":"...","value":"...","unit":"..."}]}. '+
    'Write the summary and labels in '+(lang==='es'?'Spanish':'English')+'. If you are not confident about a count or measurement, say so in the summary rather than guessing precisely.';
  if(prov.provider==='nvidia'){
    const raw=await nvidiaChat([{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:dataUrl}}]}],900);
    if(!raw)return null;
    try{ const m=raw.match(/\{[\s\S]*\}/); return m?JSON.parse(m[0]):{summary:raw,fixtureCounts:[],measurements:[]}; }catch(e){ return {summary:raw,fixtureCounts:[],measurements:[]}; }
  }
  return await ocrImage(dataUrl,prompt);
}

async function analyzeDocument(docId){
  const d=byId('documents',docId); if(!d)return;
  const ext=(d.name.match(/\.([a-z0-9]+)$/i)||['',''])[1].toLowerCase();
  const prov=cadAiProvider();
  if(ext==='dxf'){
    if(!prov){ toast(t('cad.needKey'),'warn'); go('settings'); return; }
    d.aiAnalysis={status:'pending',kind:'dxf'}; scheduleSave(); refreshDocRow(d.id);
    const url=await getFile(d.fileId);
    let text=null;
    if(url){ try{ text=decodeURIComponent(escape(atob(url.split(',')[1]))); }catch(e){ try{ text=atob(url.split(',')[1]); }catch(e2){ text=null; } } }
    const parsed=text!=null?parseDxf(text):{ok:false,error:'parse'};
    if(!parsed.ok){
      d.aiAnalysis={status:'error',kind:'dxf',summary:t('cad.err.'+parsed.error),analyzedAt:new Date().toISOString()};
      scheduleSave(); refreshDocRow(d.id); return;
    }
    const summary=await narrateDxfGeometry(parsed);
    d.aiAnalysis={status:summary?'done':'error',kind:'dxf',
      summary:summary||t('cad.err.ai'),
      measurements:parsed.lengthsByLayer.map(x=>({label:x.layer,value:x.length.toFixed(1),unit:parsed.units||t('cad.drawingUnits')})),
      fixtureCounts:parsed.fixturesByBlock.map(x=>({label:x.block,count:x.count})),
      analyzedAt:new Date().toISOString(),model:prov.provider,edited:false};
    scheduleSave(); refreshDocRow(d.id); return;
  }
  if(ext==='jpg'||ext==='jpeg'||ext==='png'){
    if(!prov){ toast(t('cad.needKey'),'warn'); go('settings'); return; }
    d.aiAnalysis={status:'pending',kind:'vision'}; scheduleSave(); refreshDocRow(d.id);
    const url=await getFile(d.fileId);
    const res=url?await analyzeDrawingImage(url):null;
    d.aiAnalysis={status:res?'done':'error',kind:'vision',
      summary:res?res.summary:t('cad.err.ai'),
      measurements:(res&&res.measurements)||[],fixtureCounts:(res&&res.fixtureCounts)||[],
      analyzedAt:new Date().toISOString(),model:prov.provider,edited:false};
    scheduleSave(); refreshDocRow(d.id); return;
  }
  d.aiAnalysis={status:'unsupported',kind:'unsupported',summary:t(ext==='pdf'?'cad.guidance.pdf':'cad.guidance.dwg'),analyzedAt:new Date().toISOString()};
  scheduleSave(); refreshDocRow(d.id);
}

async function sendChat(){
  const inp=document.getElementById('chatInput'); const q=inp.value.trim(); if(!q)return; inp.value='';
  chatHist.push({role:'user',text:q}); const box=document.getElementById('chatMsgs');

function localAnswer(q){
  const s=q.toLowerCase();
  // overdue invoices
  if(/overdue|vencid|debe|owe/.test(s)){ const ov=appData.invoices.filter(i=>invStatus(i)==='overdue'||invStatus(i)==='unpaid');
    if(!ov.length)return L('No one is overdue. ','Nadie está vencido. ');
    return L('Unpaid/overdue:\n','Sin pagar/vencidos:\n')+ov.map(i=>`• ${custName(i.customerId)} — ${money(balanceOf(i))} (${t('inv')} #${i.number})`).join('\n'); }
  // today's jobs
  if(/today|hoy/.test(s)&&/job|trabajo|schedule|agenda/.test(s)){ const jt=appData.jobs.filter(j=>j.scheduled===today()&&j.status!=='done');
    if(!jt.length)return L('No jobs scheduled today.','No hay trabajos agendados hoy.');
    return L("Today's jobs:\n",'Trabajos de hoy:\n')+jt.map(j=>`• #${j.number} ${j.title} — ${custName(j.customerId)} (${j.address||''})`).join('\n'); }
  // total collected
  if(/total|collected|cobrad|revenue|ingreso/.test(s)){ const ms=new Date(); ms.setDate(1);
    const col=appData.payments.filter(p=>new Date(p.date)>=ms).reduce((a,p)=>a+Number(p.amount||0),0);
    return L('Collected this month: ','Cobrado este mes: ')+money(col); }
  // SOP / how-to
  if(/how|cómo|como|shut|cerr|steps|pasos|guide|guía/.test(s)){
    const hit=appData.sops.find(x=>matchWords(s,(x.title+' '+x.body+' '+(x.tags||[]).join(' ')).toLowerCase()));
    if(hit)return hit.title+'\n\n'+hit.body; }
  // customer / job lookup by name
  const c=appData.customers.find(c=>s.includes(c.name.toLowerCase().split(' ')[0])&&c.name.split(' ')[0].length>2);
  if(c){ const jobs=appData.jobs.filter(j=>j.customerId===c.id);
    let out=`${c.name}\n${c.phone||''} · ${c.address||''}`;
    if(/address|direcc/.test(s))return `${c.name}: ${c.address||L('no address on file','sin dirección')}`;
    if(/phone|teléf|telef/.test(s))return `${c.name}: ${c.phone||L('no phone on file','sin teléfono')}`;
    if(jobs.length)out+='\n\n'+L('Jobs:\n','Trabajos:\n')+jobs.map(j=>`• #${j.number} ${j.title} — ${t('st.'+j.status)}`).join('\n');
    return out; }
  // job number
  const jm=s.match(/#?(\d{3,5})/); if(jm){ const j=appData.jobs.find(x=>String(x.number)===jm[1]);
    if(j)return `#${j.number} ${j.title}\n${custName(j.customerId)} · ${j.address||''}\n${t('st.'+j.status)} · ${j.description||''}`; }
  return null;
}
function matchWords(q,text){ const ws=q.split(/\s+/).filter(w=>w.length>3); let hits=0; ws.forEach(w=>{ if(text.includes(w))hits++; }); return hits>=2; }
async function aiAnswer(q){
  const k=aiKey(); if(!k)return null;
  const ctx={customers:appData.customers.map(c=>({name:c.name,phone:c.phone,address:c.address,notes:c.notes})),
    jobs:appData.jobs.map(j=>({number:j.number,title:j.title,customer:custName(j.customerId),status:j.status,address:j.address,desc:j.description})),
    invoices:appData.invoices.map(i=>({number:i.number,customer:custName(i.customerId),total:invTotal(i),status:invStatus(i)})),
    sops:appData.sops.map(x=>({title:x.title,body:x.body}))};
  try{ const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:`You are the assistant for O.T.T.O. Plumbing's CRM. Answer briefly and practically using ONLY this data. Reply in ${lang==='es'?'Spanish':'English'}. Data: ${JSON.stringify(ctx)}`,
      messages:[{role:'user',content:q}]})});
    if(!r.ok)return null; const d=await r.json(); return d.content[0].text;
  }catch(e){ return null; }
}

function toggleTracking(){
  if(trackingWatch){ navigator.geolocation.clearWatch(trackingWatch); trackingWatch=null; document.getElementById('gpsBtn').classList.remove('on');
    toast(t('toast.trackingOff'),'warn'); if(currentPage==='map')render(); return; }
  if(!navigator.geolocation){ toast(L('Location not available','Ubicación no disponible'),'err'); return; }
  trackingWatch=navigator.geolocation.watchPosition(pos=>{ logLocation(null,pos.coords.latitude,pos.coords.longitude); },
    ()=>{ toast(L('Allow location to track','Permite la ubicación para rastrear'),'warn'); trackingWatch=null; },{enableHighAccuracy:true,maximumAge:30000});
  document.getElementById('gpsBtn').classList.add('on'); toast(t('toast.tracking'),'ok'); if(currentPage==='map')render();

function logLocation(jobId,lat,lng){
  const push=(la,ln)=>{ appData.locations.push({id:uid(),userId:me.id,lat:la,lng:ln,ts:new Date().toISOString(),jobId:jobId||null});
    if(appData.locations.length>500)appData.locations=appData.locations.slice(-500); scheduleSave(); };
  if(lat!=null){ push(lat,lng); return; }
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>push(p.coords.latitude,p.coords.longitude),()=>{});
}

/* ============ EXPORT / BACKUP ============ */
function toCSV(rows){ if(!rows.length)return ''; const keys=Object.keys(rows[0]);
  return keys.join(',')+'\n'+rows.map(r=>keys.map(k=>{ let v=r[k]==null?'':String(r[k]); if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"'; return v; }).join(',')).join('\n'); }
function download(name,content,type){ const b=new Blob([content],{type:type||'text/csv'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportCSV(entity){ let rows=[];
  if(entity==='invoices')rows=appData.invoices.map(i=>({number:i.number,customer:custName(i.customerId),date:i.date,due:i.dueDate,total:invTotal(i),status:invStatus(i)}));
  else if(entity==='estimates')rows=appData.estimates.map(e=>({number:e.number,customer:custName(e.customerId),date:e.date,total:estTotal(e),status:e.status}));
  else if(entity==='customers')rows=appData.customers.map(c=>({name:c.name,phone:c.phone,email:c.email,address:c.address}));
  if(!rows.length){ toast(t('money.none'),'warn'); return; } download(entity+'.csv',toCSV(rows)); toast(t('toast.saved'),'ok'); }
function exportAll(){ ['customers','invoices','estimates'].forEach(exportCSV);
  download('jobs.csv',toCSV(appData.jobs.map(j=>({number:j.number,title:j.title,customer:custName(j.customerId),status:j.status,scheduled:j.scheduled,value:j.value,worker:(j.assignedTo||[]).map(userName).join('; ')}))));
  download('payments.csv',toCSV(appData.payments.map(p=>({date:p.date,customer:custName(p.customerId),amount:p.amount,method:p.method,checkNo:p.checkNo})))); }
function exportBackup(){ download('otto-crm-backup-'+today()+'.json',JSON.stringify(appData,null,2),'application/json'); }
function restoreBackup(inp){ const f=inp.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ appData=JSON.parse(r.result); migrate(); saveData(); toast(t('toast.saved'),'ok'); render(); renderNav(); }catch(e){ toast('Invalid file','err'); } }; r.readAsText(f); }

  appData.jobs.forEach(j=>{ if((`#${j.number} ${j.title} ${j.description||''} ${custName(j.customerId)}`).toLowerCase().includes(q))res.push({t:`#${j.number} ${j.title}`,s:custName(j.customerId),ic:'fa-wrench',fn:`openJob('${j.id}')`}); });
  appData.notes.forEach(n=>{ if(n.text.toLowerCase().includes(q))res.push({t:n.text.slice(0,50),s:custName(n.customerId),ic:'fa-note-sticky',fn:`openJob('${n.jobId}')`}); });
  appData.sops.forEach(sp=>{ if((sp.title+sp.body).toLowerCase().includes(q))res.push({t:sp.title,s:t('nav.sops'),ic:'fa-book',fn:`go('sops')`}); });
  panel.className=''; panel.style.cssText='position:fixed;top:var(--hdr);left:0;right:0;z-index:90;display:flex;justify-content:center;padding:8px 14px';
  panel.innerHTML=`<div class="card" style="width:100%;max-width:600px;margin:0;max-height:60vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.25)"><div class="card-body">
    ${res.length?res.slice(0,20).map(r=>`<div class="row-item" onclick="closeSearch();${r.fn}"><div class="av" style="width:34px;height:34px;font-size:13px"><i class="fas ${r.ic}"></i></div><div class="row-main"><div class="t" style="font-size:14px">${esc(r.t)}</div><div class="s">${esc(r.s||'')}</div></div></div>`).join('')
      :`<div class="empty" style="padding:24px"><div class="t">${t('gen.noResults')}</div></div>`}</div></div>`;
}
function closeSearch(){ const p=document.getElementById('searchPanel'); p.className='hide'; p.innerHTML=''; }
document.addEventListener('click',e=>{ if(!e.target.closest('#searchPanel')&&!e.target.closest('.search-wrap'))closeSearch(); });

/* ============ INIT ============ */
function init(){
  const th=localStorage.getItem('otto-theme'); if(th)document.documentElement.setAttribute('data-theme',th);
  document.getElementById('lang-en').classList.toggle('on',lang==='en');
  document.getElementById('lang-es').classList.toggle('on',lang==='es');
  loadData();
  renderLock();
}
init();

</script>
</body>

</html>
